<!DOCTYPE html>
<html lang="id-ID">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasang & Kelola Iklan - Rewang Iklan</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.424.0/dist/umd/lucide.min.js"></script>

    <style>
        #btnPasang { display: block !important; }
        #btnEdit, #btnHapus, #kodeKelolaGrup { display: none !important; }
        body.mode-kelola #btnPasang { display: none !important; }
        body.mode-kelola #btnEdit, body.mode-kelola #btnHapus, body.mode-kelola #kodeKelolaGrup { display: block !important; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

<header class="sticky top-0 bg-white shadow-sm z-50">
    <div class="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 text-gray-700 hover:text-blue-600">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
            <span class="font-medium">Kembali</span>
        </a>
        <h1 class="text-lg font-bold" id="judulHalaman">Pasang Iklan Baru</h1>
        <div class="w-16"></div>
    </div>
</header>

<main class="max-w-2xl mx-auto px-4 py-6">
    <div class="bg-white rounded-xl shadow-sm p-6">
        <form id="formIklan" class="space-y-5">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Foto Iklan</label>
                <input type="file" id="inputFoto" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                <p class="mt-1 text-xs text-gray-500">Format JPG/PNG, maks 5MB</p>
                <div id="kotakPratinjau" class="mt-3 w-full h-52 bg-gray-50 border-2 border-dashed border-gray-200 rounded-lg flex items-center justify-center overflow-hidden">
                    <img id="gambarPratinjau" alt="Pratinjau Foto" class="max-w-full max-h-full object-contain hidden">
                    <span id="teksPratinjau" class="text-gray-400">Foto iklan akan muncul di sini</span>
                </div>
            </div>

            <div>
                <label for="inputJudul" class="block text-sm font-medium text-gray-700 mb-2">Judul Iklan *</label>
                <input type="text" id="inputJudul" maxlength="80" required placeholder="Contoh: Rumah Minimalis Dekat Kota" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <div>
                <label for="inputKategori" class="block text-sm font-medium text-gray-700 mb-2">Kategori *</label>
                <select id="inputKategori" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    <option value="">Pilih Kategori Iklan</option>
                    <option>Mobil</option>
                    <option>Motor</option>
                    <option>Properti</option>
                    <option>Elektronik & Gadget</option>
                    <option>Lowongan Kerja</option>
                    <option>Jasa & Layanan</option>
                    <option>Hobi & Olahraga</option>
                    <option>Fashion & Aksesoris</option>
                    <option>Lainnya</option>
                </select>
            </div>

            <div>
                <label for="inputLokasi" class="block text-sm font-medium text-gray-700 mb-2">Lokasi / Kota *</label>
                <input type="text" id="inputLokasi" required placeholder="Contoh: Surabaya, Jawa Timur" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <div>
                <label for="inputWa" class="block text-sm font-medium text-gray-700 mb-2">Nomor WhatsApp *</label>
                <input type="text" id="inputWa" required placeholder="Contoh: 6281234567890" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <div>
                <label for="inputDeskripsi" class="block text-sm font-medium text-gray-700 mb-2">Deskripsi Iklan *</label>
                <textarea id="inputDeskripsi" maxlength="3000" required rows="5" placeholder="Jelaskan detail barang atau jasa Anda..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none"></textarea>
                <div class="flex justify-between items-center mt-1">
                    <span class="text-xs text-gray-500">Maksimal 3000 karakter</span>
                    <span id="jumlahKarakter" class="text-xs text-gray-500">0 / 3000</span>
                </div>
            </div>

            <div id="kodeKelolaGrup">
                <label for="inputKode" class="block text-sm font-medium text-gray-700 mb-2">Kode Kelola Iklan *</label>
                <input type="text" id="inputKode" placeholder="Masukkan kode rahasia Anda" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                <p class="mt-1 text-xs text-gray-500">Kode ini didapat saat pertama kali Anda memasang iklan</p>
            </div>

            <div class="space-y-3 pt-4">
                <button type="submit" id="btnPasang" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors">✅ Pasang Iklan Sekarang</button>
                <button type="button" id="btnEdit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition-colors">✏️ Simpan Perubahan Iklan</button>
                <button type="button" id="btnHapus" class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-lg transition-colors">🗑️ Hapus Iklan Permanen</button>
            </div>

            <div id="kotakPesan" class="mt-4 p-4 rounded-lg text-center hidden"></div>
        </form>
    </div>
</main>

<script>
lucide.createIcons();

// === URL API SUDAH SESUAI MILIK KAMU ===
const API_URL = "https://script.google.com/macros/s/AKfycbzwXBjQbOoHjb5btAFrja7llCgXT1KahBrI2-OyrfERGYy2XXkeXJxNNhdKyupqI6TK7w/exec";
let idIklan = null;
let gambarBase64 = "";

const parameterUrl = new URLSearchParams(window.location.search);
idIklan = parameterUrl.get('kelola');

if (idIklan) {
    document.body.classList.add('mode-kelola');
    document.getElementById('judulHalaman').textContent = 'Edit Iklan Saya';
    ambilDataIklan();
}

// === AMBIL DATA UNTUK EDIT ===
async function ambilDataIklan() {
    tampilkanPesan('info', 'Sedang memuat data iklan...');
    try {
        const res = await fetch(`${API_URL}?action=detail&id=${encodeURIComponent(idIklan)}`);
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Iklan tidak ditemukan');
        const iklan = data.ad;

        document.getElementById('inputJudul').value = iklan.title || '';
        document.getElementById('inputKategori').value = iklan.category || '';
        document.getElementById('inputLokasi').value = iklan.location || '';
        document.getElementById('inputWa').value = iklan.whatsapp || '';
        document.getElementById('inputDeskripsi').value = iklan.description || '';
        
        const panjang = iklan.description?.length || 0;
        document.getElementById('jumlahKarakter').textContent = `${panjang} / 3000`;

        if (iklan.image) {
            const gambarPratinjau = document.getElementById('gambarPratinjau');
            const teksPratinjau = document.getElementById('teksPratinjau');
            gambarPratinjau.src = iklan.image;
            gambarPratinjau.classList.remove('hidden');
            teksPratinjau.classList.add('hidden');
        }
        sembunyikanPesan();
    } catch (err) {
        tampilkanPesan('error', 'Gagal memuat data: ' + err.message);
    }
}

// === KIRIM IKLAN BARU - 100% COCOK DENGAN .GS KAMU ===
document.getElementById('formIklan').addEventListener('submit', async function(e) {
    e.preventDefault();

    const judul = document.getElementById('inputJudul').value.trim();
    const kategori = document.getElementById('inputKategori').value;
    const lokasi = document.getElementById('inputLokasi').value.trim();
    const wa = document.getElementById('inputWa').value.trim();
    const deskripsi = document.getElementById('inputDeskripsi').value.trim();

    tampilkanPesan('info', 'Sedang mengirim iklan...');

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                title: judul,
                category: kategori,
                location: lokasi,
                whatsapp: wa,
                description: deskripsi,
                image: gambarBase64
            })
        });

        const hasil = await res.json();
        if (hasil.success) {
            tampilkanPesan('sukses', `✅ Iklan berhasil terpasang!\nSimpan Kode Kelola: ${hasil.secret_code}`);
            setTimeout(() => window.location.href = 'index.html', 6000);
        } else {
            tampilkanPesan('error', `❌ ${hasil.error}`);
        }
    } catch (err) {
        tampilkanPesan('error', 'Gagal terhubung ke server, coba lagi nanti.');
        console.error(err);
    }
});

// === EDIT IKLAN ===
document.getElementById('btnEdit').addEventListener('click', async function() {
    const kodeKelola = document.getElementById('inputKode').value.trim();
    if (!kodeKelola) {
        tampilkanPesan('error', 'Masukkan Kode Kelola Anda!');
        return;
    }
    tampilkanPesan('info', 'Sedang menyimpan perubahan...');
    try {
        const dataKirim = new URLSearchParams();
        dataKirim.append('action', 'updateAd');
        dataKirim.append('id', idIklan);
        dataKirim.append('secret_code', kodeKelola);
        dataKirim.append('title', document.getElementById('inputJudul').value.trim());
        dataKirim.append('category', document.getElementById('inputKategori').value);
        dataKirim.append('location', document.getElementById('inputLokasi').value.trim());
        dataKirim.append('whatsapp', document.getElementById('inputWa').value.trim());
        dataKirim.append('description', document.getElementById('inputDeskripsi').value.trim());

        const res = await fetch(`${API_URL}?${dataKirim.toString()}`);
        const hasil = await res.json();
        if (hasil.success) {
            tampilkanPesan('sukses', '✅ Perubahan disimpan!');
            setTimeout(() => window.location.href = 'index.html', 2500);
        } else {
            tampilkanPesan('error', '❌ Kode Kelola tidak cocok!');
        }
    } catch (err) {
        tampilkanPesan('error', 'Gagal terhubung ke server.');
    }
});

// === HAPUS IKLAN ===
document.getElementById('btnHapus').addEventListener('click', async function() {
    const kodeKelola = document.getElementById('inputKode').value.trim();
    if (!kodeKelola) {
        tampilkanPesan('error', 'Masukkan Kode Kelola Anda!');
        return;
    }
    if (!confirm('⚠️ Hapus permanen? Tidak bisa dikembalikan!')) return;
    tampilkanPesan('info', 'Sedang menghapus...');
    try {
        const dataKirim = new URLSearchParams();
        dataKirim.append('action', 'deleteAd');
        dataKirim.append('id', idIklan);
        dataKirim.append('secret_code', kodeKelola);
        const res = await fetch(`${API_URL}?${dataKirim.toString()}`);
        const hasil = await res.json();
        if (hasil.success) {
            tampilkanPesan('sukses', '✅ Iklan dihapus.');
            setTimeout(() => window.location.href = 'index.html', 2500);
        } else {
            tampilkanPesan('error', '❌ Kode Kelola tidak cocok!');
        }
    } catch (err) {
        tampilkanPesan('error', 'Gagal terhubung ke server.');
    }
});

// === PROSES GAMBAR KE BASE64 ===
const inputFoto = document.getElementById('inputFoto');
const gambarPratinjau = document.getElementById('gambarPratinjau');
const teksPratinjau = document.getElementById('teksPratinjau');

inputFoto.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) {
        gambarPratinjau.classList.add('hidden');
        teksPratinjau.classList.remove('hidden');
        gambarBase64 = "";
        return;
    }
    if (file.size > 5 * 1024 * 1024) {
        tampilkanPesan('error', 'Ukuran gambar maksimal 5MB!');
        inputFoto.value = "";
        return;
    }
    const pembaca = new FileReader();
    pembaca.onload = function(e) {
        gambarBase64 = e.target.result;
        gambarPratinjau.src = e.target.result;
        gambarPratinjau.classList.remove('hidden');
        teksPratinjau.classList.add('hidden');
    }
    pembaca.readAsDataURL(file);
});

// === HITUNG KARAKTER ===
const inputDeskripsi = document.getElementById('inputDeskripsi');
const jumlahKarakter = document.getElementById('jumlahKarakter');
inputDeskripsi.addEventListener('input', function() {
    const panjang = this.value.length;
    jumlahKarakter.textContent = `${panjang} / 3000`;
});

function tampilkanPesan(jenis, teks) {
    const kotak = document.getElementById('kotakPesan');
    kotak.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-green-50', 'text-green-700', 'bg-blue-50', 'text-blue-700');
    if (jenis === 'error') kotak.classList.add('bg-red-50', 'text-red-700');
    else if (jenis === 'sukses') kotak.classList.add('bg-green-50', 'text-green-700');
    else kotak.classList.add('bg-blue-50', 'text-blue-700');
    kotak.textContent = teks;
}
function sembunyikanPesan() {
    document.getElementById('kotakPesan').classList.add('hidden');
}
</script>
</body>
</html>
