<body>
    <div class="phone-shell">
        <button class="scroll-btn scroll-up" id="scrollUp">↑</button>
        <button class="scroll-btn scroll-down" id="scrollDown">↓</button>

        <div class="phone-screen">
            <div class="content-area" id="mainContent">
                <div class="page">
                    <div class="back-bar">
                        <button class="btn-back" onclick="window.location.href='index.html'">←</button>
                        <h4 id="formTitle">Pasang Iklan Baru</h4>
                    </div>

                    <div class="form-page">
                        <div class="form-card">
                            <form id="adForm">
                                <div class="form-layout">
                                    <div class="upload-side">
                                        <label class="upload-title">Foto Iklan</label>
                                        <input type="file" id="imageInput" accept="image/*">
                                        <p class="help">Format JPG/PNG, otomatis diubah ke WebP</p>
                                        <div class="preview-box">
                                            <img id="previewImage" alt="Pratinjau Gambar">
                                        </div>
                                    </div>

                                    <div class="data-side">
                                        <div class="form-group">
                                            <label>Judul Iklan</label>
                                            <input type="text" id="title" maxlength="80" required>
                                        </div>

                                        <div class="form-group">
                                            <label>Kategori</label>
                                            <select id="category" required>
                                                <option value="">Pilih Kategori</option>
                                                <option>Mobil</option>
                                                <option>Motor</option>
                                                <option>Properti</option>
                                                <option>Elektronik</option>
                                                <option>Lowongan</option>
                                                <option>Jasa</option>
                                                <option>Hobi</option>
                                                <option>Fashion</option>
                                                <option>Lainnya</option>
                                            </select>
                                        </div>

                                        <div class="form-group">
                                            <label>Lokasi / Kota</label>
                                            <input type="text" id="location" required>
                                        </div>

                                        <div class="form-group">
                                            <label>Nomor WhatsApp</label>
                                            <input type="text" id="whatsapp" placeholder="Contoh: 6281234567890" required>
                                        </div>

                                        <div class="form-group">
                                            <label>Deskripsi Iklan</label>
                                            <textarea id="description" maxlength="500" required></textarea>
                                            <div id="charCount" class="char-count">0 / 500</div>
                                        </div>

                                        <div class="form-group" id="secretGroup" style="display:none;">
                                            <label>Kode Kelola</label>
                                            <input type="text" id="secretCode" placeholder="Masukkan kode rahasia Anda">
                                            <p class="help">Kode ini didapat saat pertama kali pasang iklan</p>
                                        </div>
                                    </div>
                                </div>

                                <div class="form-buttons">
                                    <button type="submit" class="btn-kirim" id="btnKirim">✅ Pasang Iklan</button>
                                    <button type="button" class="btn-edit" id="btnEdit">✏️ Simpan Perubahan</button>
                                    <button type="button" class="btn-hapus" id="btnHapus">🗑️ Hapus Iklan</button>
                                </div>
                            </form>

                            <div id="statusBox" class="status-box"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
