<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasang Iklan Baru | Rewang Iklan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-shell">
        <div class="phone-screen">
            <div class="content-area" id="mainContent">
                <div class="page">
                    <div class="top-bar">
                        <button class="btn-back" onclick="window.location.href='index.html'">←</button>
                        <h3 style="margin:0; flex:1; text-align:center;">Pasang Iklan Baru</h3>
                    </div>

                    <div class="form-page">
                        <div class="form-card">
                            <form id="adForm">
                                <div class="form-layout">
                                    <div class="upload-side">
                                        <label class="upload-title">Foto Produk / Barang</label>
                                        <input type="file" id="imageInput" accept="image/*" required>
                                        <p class="help">Format JPG/PNG, otomatis diubah ke WebP agar lebih cepat dimuat</p>
                                        <div class="preview-box">
                                            <img id="previewImage" alt="Pratinjau Gambar">
                                        </div>
                                    </div>

                                    <div class="data-side">
                                        <div class="form-group">
                                            <label>Judul Iklan</label>
                                            <input type="text" id="title" maxlength="80" placeholder="Contoh: Jual Motor Vario 2022" required>
                                        </div>

                                        <div class="form-group">
                                            <label>Kategori</label>
                                            <select id="category" required>
                                                <option value="">Pilih Kategori</option>
                                                <option>Mobil</option>
                                                <option>Motor</option>
                                                <option>Properti</option>
                                                <option>Elektronik</option>
                                                <option>Lowongan</option>
                                                <option>Jasa</option>
                                                <option>Hobi</option>
                                                <option>Fashion</option>
                                                <option>Lainnya</option>
                                            </select>
                                        </div>

                                        <div class="form-group">
                                            <label>Lokasi / Kota</label>
                                            <input type="text" id="location" placeholder="Contoh: Surabaya, Jawa Timur" required>
                                        </div>

                                        <div class="form-group">
                                            <label>Nomor WhatsApp</label>
                                            <input type="text" id="whatsapp" placeholder="Contoh: 6281234567890" required>
                                        </div>

                                        <div class="form-group">
                                            <label>Deskripsi Iklan</label>
                                            <textarea id="description" maxlength="500" placeholder="Jelaskan secara rinci kondisi barang, harga, dan info lainnya..." required></textarea>
                                            <div id="charCount" class="char-count">0 / 500</div>
                                        </div>
                                    </div>
                                </div>

                                <button type="submit" class="submit-btn">✅ Pasang Iklan Sekarang</button>
                            </form>

                            <div id="statusBox" class="status-box"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
