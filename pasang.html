<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Pasang Iklan Gratis — Rewang Iklan</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Pasang iklan baris gratis tanpa daftar, langsung tayang. Atau edit iklan yang sudah kamu pasang.">
</head>
<body>

<!-- HEADER & NAVIGASI -->
<header class="header">
    <div class="container">
        <div class="logo">
            <h2>🟢 REWANG IKLAN</h2>
        </div>
        <nav class="nav-menu">
            <a href="index.html">Beranda</a>
            <a href="index.html#iklan">Daftar Iklan</a>
            <a href="panduan.html">Panduan Beriklan</a>
            <a href="pasang.html" class="aktif">Pasang Iklan</a>
            <a href="#">Tentang Kami</a>
        </nav>
        <div class="menu-toggle" id="mobileMenu">☰</div>
    </div>
</header>

<section class="content-wrapper">
    <div class="container">
        <div class="form-page">
            <div class="form-card">
                <h2 id="formHeading">📝 FORM PASANG IKLAN BARIS GRATIS</h2>

                <form id="adForm">
                    <div class="form-layout">
                        <div class="upload-side">
                            <label class="upload-title"> Foto Produk / Layanan </label>
                            <input type="file" id="imageInput" accept="image/*" />
                            <p class="help">JPG/PNG otomatis diubah ke WebP dan dikompres.</p>
                            <div id="previewBox" class="preview-box">
                                <img id="previewImage" alt="Pratinjau Gambar" />
                            </div>
                        </div>

                        <div class="data-side">
                            <div class="form-group" id="secretGroup" style="display:none;">
                                <label> Kode Kelola Iklan </label>
                                <input type="text" id="secretCode" placeholder="Masukkan kode kelola untuk konfirmasi" />
                            </div>

                            <div class="form-group">
                                <label> Judul Iklan </label>
                                <input type="text" id="title" maxlength="80" required placeholder="Contoh: Jual Churros Enak Surabaya" />
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label> Kategori </label>
                                    <select id="category" required>
                                        <option value="">Pilih Kategori</option>
                                        <option>Elektronik</option>
                                        <option>Kendaraan</option>
                                        <option>Properti</option>
                                        <option>Lowongan</option>
                                        <option>Hobi</option>
                                        <option>Jasa</option>
                                        <option>Hewan</option>
                                        <option>Lainnya</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label> Lokasi </label>
                                    <input type="text" id="location" required placeholder="Contoh: Surabaya Barat" />
                                </div>
                            </div>

                            <div class="form-group">
                                <label> Nomor Telepon / WhatsApp </label>
                                <input type="text" id="whatsapp" placeholder="Contoh: 6281234567890" required />
                            </div>

                            <div class="form-group">
                                <label> Deskripsi Iklan </label>
                                <textarea id="description" maxlength="500" required placeholder="Jelaskan barang atau jasa yang kamu tawarkan secara jelas..."></textarea>
                                <div id="charCount" class="char-count">0 / 500</div>
                            </div>
                        </div>
                    </div>

                    <!-- TOMBOL BERUBAH OTOMATIS -->
                    <button type="submit" id="submitBtn" class="submit-btn">PASANG IKLAN</button>
                    <div id="editButtons" style="display:none; gap:10px; margin-top:10px;">
                        <button type="button" id="saveEditBtn" class="submit-btn" style="flex:1;">SIMPAN PERUBAHAN</button>
                        <button type="button" id="deleteBtn" class="submit-btn" style="flex:1; background:#dc3545;">HAPUS IKLAN</button>
                    </div>
                </form>

                <div id="statusBox" class="statusBox" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>
</section>

<!-- Iklan AdSense -->
<div class="container" style="max-width:1100px; margin:20px auto;">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6458870303612779"
     crossorigin="anonymous"></script>
<ins class="adsbygoogle"
     style="display:block"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
</div>

<!-- FOOTER -->
<footer class="footer">
    <div class="container">
        <p>© 2026 Rewang Iklan — Wadah Beriklan Saling Bantu. Semua Iklan Dijaga Kebenarannya.</p>
    </div>
</footer>

<script>
// FUNGSI MENU
const menuToggle = document.getElementById('mobileMenu');
const navMenu = document.querySelector('.nav-menu');
menuToggle.addEventListener('click', () => navMenu.classList.toggle('active'));
document.addEventListener('click', e => {
    if (!menuToggle.contains(e.target) && !navMenu.contains(e.target)) navMenu.classList.remove('active');
});

// KONFIGURASI SESUAI IKLAN-SAYA.JS
const API_URL = "https://script.google.com/macros/s/AKfycbzwXBjQbOoHjb5btAFrja7llCgXT1KahBrI2-OyrfERGYy2XXkeXJxNNhdKyupqI6TK7w/exec";
const STORAGE_KEY = "rewang_iklan_history";
const params = new URLSearchParams(location.search);
const editId = params.get("id");
let currentAd = null;
let imageBase64 = "";

// ELEMEN UTAMA
const pageTitle = document.getElementById("pageTitle");
const formHeading = document.getElementById("formHeading");
const secretGroup = document.getElementById("secretGroup");
const submitBtn = document.getElementById("submitBtn");
const editButtons = document.getElementById("editButtons");
const adForm = document.getElementById("adForm");
const statusBox = document.getElementById("statusBox");
const desc = document.getElementById("description");
const count = document.getElementById("charCount");

// ======================
// DETEKSI MODE: PASANG ATAU EDIT
// ======================
if (editId) {
    // MODE EDIT: UBAH JUDUL & TAMPILAN
    pageTitle.textContent = "Edit Iklan — Rewang Iklan";
    formHeading.textContent = "✏️ EDIT IKLAN SAYA";
    secretGroup.style.display = "block";
    submitBtn.style.display = "none";
    editButtons.style.display = "flex";
    adForm.querySelector("#imageInput").required = false;
    statusBox.innerHTML = `<div style="padding:15px; background:#e7f3ff; border:1px solid #0d6efd;">Masukkan <strong>Kode Kelola</strong> terlebih dahulu, lalu klik tombol Simpan atau Hapus.</div>`;
} else {
    // MODE PASANG BARU: TAMPILAN BIASA
    pageTitle.textContent = "Pasang Iklan Gratis — Rewang Iklan";
    formHeading.textContent = "📝 FORM PASANG IKLAN BARIS GRATIS";
    secretGroup.style.display = "none";
    submitBtn.style.display = "block";
    editButtons.style.display = "none";
}

// ======================
// FUNGSI UMUM: HITUNG KARAKTER
// ======================
desc.addEventListener("input", () => count.textContent = desc.value.length + " / 500");

// ======================
// FUNGSI UMUM: PREVIEW & KONVERSI GAMBAR
// ======================
document.getElementById("imageInput").addEventListener("change", handleImage);
async function handleImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    const webp = await convertToWebP(file);
    imageBase64 = webp;
    document.getElementById("previewImage").src = webp;
}
function convertToWebP(file) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = ev => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement("canvas");
                canvas.width = 600; canvas.height = 450;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0, 600, 450);
                resolve(canvas.toDataURL("image/webp", 0.75));
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });
}

// ======================
// MODE PASANG BARU: KIRIM IKLAN
// ======================
adForm.addEventListener("submit", async e => {
    e.preventDefault();
    if (editId) return; // JALANKAN HANYA JIKA MODE PASANG

    if (!cekBatasIklan()) return;
    if (!cekKemiripan()) return;

    statusBox.innerHTML = "⏳ Mengirim iklan...";
    const payload = {
        title: document.getElementById("title").value,
        category: document.getElementById("category").value,
        location: document.getElementById("location").value,
        whatsapp: document.getElementById("whatsapp").value,
        description: document.getElementById("description").value,
        image: imageBase64,
        date: new Date().toISOString()
    };

    try {
        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.success) {
            alert(`✅ IKLAN BERHASIL DIPASANG!\nID: ${result.id}\nKode Kelola: ${result.secret_code}`);
            simpanKeRiwayat(payload.title, payload.description);
            adForm.reset(); document.getElementById("previewImage").src = ""; count.textContent = "0 / 500"; imageBase64 = "";
        } else {
            alert("❌ " + result.error);
        }
    } catch (err) {
        alert("❌ Gagal terhubung ke server");
    }
});

// ======================
// MODE EDIT: SIMPAN PERUBAHAN
// ======================
document.getElementById("saveEditBtn").addEventListener("click", async () => {
    const secret = document.getElementById("secretCode").value.trim();
    if (!secret) return alert("⚠️ Masukkan Kode Kelola terlebih dahulu!");

    statusBox.innerHTML = "⏳ Memverifikasi & menyimpan...";
    try {
        // AMBIL DATA DULU UNTUK VALIDASI (SESUAI POLA IKLAN-SAYA.JS)
        const cekRes = await fetch(API_URL + "?action=getAd&id=" + encodeURIComponent(editId) + "&secret_code=" + encodeURIComponent(secret));
        const cekData = await cekRes.json();
        if (!cekData.success) throw new Error(cekData.error || "ID Iklan atau Kode Kelola tidak valid!");

        // JIKA VALID, LANJUT UPDATE
        const payload = {
            id: editId,
            secret_code: secret,
            title: document.getElementById("title").value,
            category: document.getElementById("category").value,
            location: document.getElementById("location").value,
            whatsapp: document.getElementById("whatsapp").value,
            description: document.getElementById("description").value,
            image: imageBase64 || cekData.ad.image
        };

        const res = await fetch(API_URL + "?action=updateAd", { method: "POST", body: JSON.stringify(payload) });
        const data = await res.json();
        if (data.success) {
            alert("✅ Iklan berhasil diperbarui!");
            window.location.href = "iklan.html?id=" + editId;
        } else {
            alert("❌ " + (data.error || "Gagal menyimpan!"));
        }
    } catch (err) {
        alert("❌ " + err.message);
    }
});

// ======================
// MODE EDIT: HAPUS IKLAN
// ======================
document.getElementById("deleteBtn").addEventListener("click", async () => {
    const secret = document.getElementById("secretCode").value.trim();
    if (!secret) return alert("⚠️ Masukkan Kode Kelola terlebih dahulu!");
    if (!confirm("⚠️ Yakin ingin menghapus iklan ini? Tindakan ini tidak bisa dibatalkan!")) return;

    statusBox.innerHTML = "⏳ Memverifikasi & menghapus...";
    try {
        // CEK VALIDASI DULU SEPERTI DI ATAS
        const cekRes = await fetch(API_URL + "?action=getAd&id=" + encodeURIComponent(editId) + "&secret_code=" + encodeURIComponent(secret));
        const cekData = await cekRes.json();
        if (!cekData.success) throw new Error(cekData.error || "ID Iklan atau Kode Kelola tidak valid!");

        // JIKA VALID, LANJUT HAPUS
        const res = await fetch(API_URL + "?action=deleteAd&id=" + encodeURIComponent(editId) + "&secret_code=" + encodeURIComponent(secret));
        const data = await res.json();
        if (data.success) {
            alert("✅ Iklan berhasil dihapus!");
            window.location.href = "index.html#iklan";
        } else {
            alert("❌ " + (data.error || "Gagal menghapus!"));
        }
    } catch (err) {
        alert("❌ " + err.message);
    }
});

// ======================
// FUNGSI PEMBATASAN (KHUSUS PASANG BARU)
// ======================
function cekBatasIklan() {
    const riwayat = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    const sekarang = new Date();
    const batas24jam = 24 * 60 * 60 * 1000;
    const jumlah = riwayat.filter(t => (sekarang - new Date(t)) < batas24jam).length;
    if (jumlah >= 3) { alert("⚠️ Maksimal 3 iklan dalam 24 jam!"); return false; }
    return true;
}
function cekKemiripan() {
    const teksBaru = (document.getElementById("title").value + " " + document.getElementById("description").value).toLowerCase().trim();
    const lama = JSON.parse(localStorage.getItem(STORAGE_KEY + "_teks") || "[]");
    for (let t of lama) {
        const persen = hitungPersenMirip(teksBaru, t);
        if (persen >= 0.8) { alert(`⚠️ Iklan mirip ${Math.round(persen*100)}% dengan yang lama! Ubah dulu ya.`); return false; }
    }
    return true;
}
function hitungPersenMirip(a, b) {
    const ka = a.split(" "), kb = b.split(" ");
    let sama = 0; ka.forEach(k => { if (kb.includes(k)) sama++ });
    return sama / Math.max(ka.length, kb.length);
}
function simpanKeRiwayat(judul, deskripsi) {
    const riwayat = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    const teks = JSON.parse(localStorage.getItem(STORAGE_KEY + "_teks") || "[]");
    riwayat.push(new Date().toISOString());
    teks.push((judul + " " + deskripsi).toLowerCase().trim());
    localStorage.setItem(STORAGE_KEY, JSON.stringify(riwayat));
    localStorage.setItem(STORAGE_KEY + "_teks", JSON.stringify(teks));
}
</script>

</body>
</html>
