<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasang Iklan Gratis — Rewang Iklan</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Pasang iklan baris gratis tanpa daftar, langsung tayang. Isi form di bawah dan iklanmu akan muncul seketika.">
</head>
<body>

<!-- HEADER & NAVIGASI SAMA PERSIS DENGAN HALAMAN LAIN -->
<header class="header">
    <div class="container">
        <div class="logo">
            <h2>🟢 REWANG IKLAN</h2>
        </div>
        <nav class="nav-menu">
            <a href="index.html">Beranda</a>
            <a href="index.html#iklan">Daftar Iklan</a>
            <a href="panduan.html">Panduan Beriklan</a>
            <a href="#">Tentang Kami</a>
            <button class="btn-pasang" onclick="window.location.href='pasang.html'">Pasang Iklan Gratis</button>
        </nav>
        <div class="menu-toggle" id="mobileMenu">☰</div>
    </div>
</header>

<section class="content-wrapper">
    <div class="container">
        <div class="form-page">
            <div class="form-card">
                <h2>📝 FORM PASANG IKLAN BARIS GRATIS</h2>
                <form id="adForm">
                    <div class="form-layout">
                        <div class="upload-side">
                            <label class="upload-title"> Foto Produk / Layanan </label>
                            <input type="file" id="imageInput" accept="image/*" required />
                            <p class="help">JPG/PNG otomatis diubah ke WebP dan dikompres.</p>
                            <div id="previewBox" class="preview-box">
                                <img id="previewImage" alt="Pratinjau Gambar" />
                            </div>
                        </div>

                        <div class="data-side">
                            <div class="form-group">
                                <label> Judul Iklan </label>
                                <input type="text" id="title" maxlength="80" required placeholder="Contoh: Jual Churros Enak Surabaya" />
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label> Kategori </label>
                                    <select id="category" required>
                                        <option value="">Pilih Kategori</option>
                                        <option>Elektronik</option>
                                        <option>Kendaraan</option>
                                        <option>Properti</option>
                                        <option>Lowongan</option>
                                        <option>Hobi</option>
                                        <option>Jasa</option>
                                        <option>Hewan</option>
                                        <option>Lainnya</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label> Lokasi </label>
                                    <input type="text" id="location" required placeholder="Contoh: Surabaya Barat" />
                                </div>
                            </div>

                            <div class="form-group">
                                <label> Nomor Telepon / WhatsApp </label>
                                <input type="text" id="whatsapp" placeholder="Contoh: 6281234567890" required />
                            </div>

                            <div class="form-group">
                                <label> Deskripsi Iklan </label>
                                <textarea id="description" maxlength="500" required placeholder="Jelaskan barang atau jasa yang kamu tawarkan secara jelas..."></textarea>
                                <div id="charCount" class="char-count">0 / 500</div>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">PASANG IKLAN</button>
                </form>

                <div id="statusBox" class="status-box"></div>
            </div>
        </div>
    </div>
</section>

<!-- Iklan AdSense -->
<div class="container" style="max-width:1100px; margin:20px auto;">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6458870303612779"
     crossorigin="anonymous"></script>
<ins class="adsbygoogle"
     style="display:block"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
</div>

<!-- FOOTER SAMA PERSIS DENGAN HALAMAN LAIN -->
<footer class="footer">
    <div class="container">
        <p>© 2026 Rewang Iklan — Wadah Beriklan Saling Bantu. Semua Iklan Dijaga Kebenarannya.</p>
    </div>
</footer>

<script>
// FUNGSI MENU SAMA DENGAN HALAMAN LAIN
const menuToggle = document.getElementById('mobileMenu');
const navMenu = document.querySelector('.nav-menu');

menuToggle.addEventListener('click', () => {
    navMenu.classList.toggle('active');
});

document.addEventListener('click', (e) => {
    if (!menuToggle.contains(e.target) && !navMenu.contains(e.target)) {
        navMenu.classList.remove('active');
    }
});

/* =========================
CONFIG API & PENYIMPANAN LOKAL
========================= */
const API_URL = "https://script.google.com/macros/s/AKfycbzwXBjQbOoHjb5btAFrja7llCgXT1KahBrI2-OyrfERGYy2XXkeXJxNNhdKyupqI6TK7w/exec";
const STORAGE_KEY = "rewang_iklan_history";

/* =========================
HITUNG KARAKTER
========================= */
const desc = document.getElementById("description");
const count = document.getElementById("charCount");

desc.addEventListener("input", () => {
    count.textContent = desc.value.length + " / 500";
});

/* =========================
PREVIEW & KONVERSI GAMBAR
========================= */
let imageBase64 = "";

document.getElementById("imageInput").addEventListener("change", handleImage);

async function handleImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    const webp = await convertToWebP(file);
    imageBase64 = webp;
    document.getElementById("previewImage").src = webp;
}

function convertToWebP(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = function(ev) {
            const img = new Image();
            img.onload = function() {
                const width = 200;
                const height = 150;
                const canvas = document.createElement("canvas");
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0, width, height);
                const data = canvas.toDataURL("image/webp", 0.60);
                resolve(data);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    });
}

/* =========================
1. CEK BATAS MAKSIMAL 3 IKLAN DALAM 24 JAM
========================= */
function cekBatasIklan() {
    const riwayat = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    const sekarang = new Date();
    const batasWaktu = 24 * 60 * 60 * 1000; // 24 jam

    // Hitung iklan yang dikirim dalam 24 jam terakhir
    const iklanHariIni = riwayat.filter(tanggal => {
        return (sekarang - new Date(tanggal)) < batasWaktu;
    });

    if (iklanHariIni.length >= 3) {
        alert("⚠️ PERINGATAN: Anda sudah memasang 3 iklan dalam 24 jam terakhir.\nSilakan coba lagi besok ya!");
        return false;
    }
    return true;
}

/* =========================
2. CEK KEMIRIPAN DENGAN IKLAN SEBELUMNYA (≥80% = DITOLAK)
========================= */
function cekKemiripan() {
    const judulBaru = document.getElementById("title").value.toLowerCase().trim();
    const deskripsiBaru = document.getElementById("description").value.toLowerCase().trim();
    const teksBaru = (judulBaru + " " + deskripsiBaru).replace(/\s+/g, " ");

    // Ambil daftar iklan yang pernah dikirim dari penyimpanan lokal
    const iklanSebelumnya = JSON.parse(localStorage.getItem(STORAGE_KEY + "_teks") || "[]");

    for (let lama of iklanSebelumnya) {
        const persen = hitungPersenMirip(teksBaru, lama);
        if (persen >= 0.80) { // 80% mirip
            alert(`⚠️ PERINGATAN: Iklan ini sekitar ${Math.round(persen*100)}% mirip dengan iklan yang sudah Anda pasang sebelumnya.\n\nSilakan ubah judul atau deskripsinya agar berbeda, jangan mengirim iklan yang sama berulang kali ya!`);
            return false;
        }
    }
    return true;
}

// Hitung persentase kesamaan kata
function hitungPersenMirip(a, b) {
    const kataA = a.split(" ");
    const kataB = b.split(" ");
    let sama = 0;
    kataA.forEach(kata => {
        if (kataB.includes(kata)) sama++;
    });
    return sama / Math.max(kataA.length, kataB.length);
}

/* =========================
3. SIMPAN KE RIWAYAT SETELAH BERHASIL
========================= */
function simpanKeRiwayat(judul, deskripsi) {
    const riwayat = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    const teksRiwayat = JSON.parse(localStorage.getItem(STORAGE_KEY + "_teks") || "[]");

    // Simpan waktu pengiriman
    riwayat.push(new Date().toISOString());
    localStorage.setItem(STORAGE_KEY, JSON.stringify(riwayat));

    // Simpan teks iklan untuk cek kemiripan nanti
    teksRiwayat.push((judul + " " + deskripsi).toLowerCase().trim().replace(/\s+/g, " "));
    localStorage.setItem(STORAGE_KEY + "_teks", JSON.stringify(teksRiwayat));
}

/* =========================
KIRIM FORM KE SERVER (DENGAN PERATURAN)
========================= */
document.getElementById("adForm").addEventListener("submit", submitAd);

async function submitAd(e) {
    e.preventDefault();
    const status = document.getElementById("statusBox");

    // ✅ JALANKAN SEMUA PERATURAN SEBELUM DIKIRIM
    if (!cekBatasIklan()) return;
    if (!cekKemiripan()) return;

    status.innerHTML = "Mengirim iklan ke server...";

    const payload = {
        title: document.getElementById("title").value,
        category: document.getElementById("category").value,
        location: document.getElementById("location").value,
        whatsapp: document.getElementById("whatsapp").value,
        description: document.getElementById("description").value,
        image: imageBase64,
        date: new Date().toISOString()
    };

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(payload)
        });

        const result = await res.json();

        if (result.success) {
            alert("✅ IKLAN BERHASIL DIPASANG\n\nID IKLAN:\n" + result.id + "\n\nKODE KELOLA:\n" + result.secret_code + "\n\nSimpan kode ini baik-baik.");

            status.innerHTML = `
            <div style="padding:15px; background:#e8fff0; border:2px solid #28a745; line-height:1.8;">
                <b>✅ Iklan berhasil dipasang</b><br><br>
                <b>ID Iklan:</b><br>${result.id}<br><br>
                <b>Kode Kelola:</b><br>
                <span style="font-size:22px; font-weight:bold; color:#d60000; letter-spacing:2px;">${result.secret_code}</span>
                <br><br>
                <b>Simpan kode ini baik-baik.</b><br>
                Kode diperlukan untuk mengedit atau menghapus iklan.<br>
                Kami tidak dapat menampilkan kembali kode ini.
            </div>`;

            // ✅ Simpan iklan ke riwayat karena berhasil terkirim
            simpanKeRiwayat(payload.title, payload.description);
            imageBase64 = "";
        } else {
            status.innerHTML = `
            <div style="padding:15px; background:#fff2f2; border:2px solid #dc3545;">
                ⚠️ ${result.error}
            </div>`;
        }

        // Reset form
        document.getElementById("adForm").reset();
        document.getElementById("previewImage").src = "";
        count.textContent = "0 / 500";

    } catch (err) {
        status.innerHTML = "❌ Gagal mengirim iklan. Coba lagi nanti.";
        console.error(err);
    }
}
</script>

</body>
</html>
