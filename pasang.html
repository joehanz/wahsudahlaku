<!DOCTYPE html>
<html lang="id">
<head>
    <script>
    (function() {
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) 
                        || window.innerWidth < 768;
        if (isMobile && !window.location.pathname.includes('/mobile.html')) {
            window.location.href = 'https://rewangiklan.my.id/mobile.html';
        }
    })();
    </script>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
        
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Pasang Iklan Gratis - Rewang Iklan</title>
    <meta name="description" content="Pasang iklan baris gratis tanpa daftar di Rewang Iklan.">
    <meta name="robots" content="index,follow">
    <meta name="author" content="Rewang Iklan">
    <meta name="theme-color" content="#2b3a55">
    <link rel="canonical" href="https://rewangiklan.my.id/pasang.html">
    <meta name="google-site-verification" content="tw4lMqeQpPnFaLgzP9kkFU64PxgiGxePrDuMbpWDaio">
    <meta name="google-adsense-account" content="ca-pub-6458870303612779">

    <link rel="icon" type="image/webp" href="https://raw.githubusercontent.com/joehanz/wahsudahlaku/refs/heads/main/image/icon-rewangiklan.webp">  
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.424.0/dist/umd/lucide.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0F172A',
                        secondary: '#1E293B',
                        accent: '#2563EB',
                        light: '#F8FAFC',
                        muted: '#94A3B8'
                    }
                }
            }
        }
    </script>

    <style>
        /* === PERATURAN TOMBOL YANG TIDAK BISA DITIMPA === */
        #btnKirim { display: block !important; }
        #btnEdit { display: none !important; }
        #btnHapus { display: none !important; }
        #secretGroup { display: none !important; }

        /* === MODE KELOLA: AKTIFKAN DENGAN KELAS KHUSUS === */
        body.kelola-mode #btnKirim { display: none !important; }
        body.kelola-mode #btnEdit { display: block !important; }
        body.kelola-mode #btnHapus { display: block !important; }
        body.kelola-mode #secretGroup { display: block !important; }
    </style>
</head>
<body class="bg-white text-primary font-sans">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-2.5">
                <a href="index.html" class="flex items-center gap-2.5">
                    <i data-lucide="layout-grid" class="w-8 h-8 text-accent"></i>
                    <span class="text-2xl font-semibold">Rewang Iklan</span>
                </a>
            </div>
            <center class="text-2xl font-bold !mb-0">
                <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6458870303612779" crossorigin="anonymous"></script>
                <ins class="adsbygoogle" style="display:inline-block;width:468px;height:60px" data-ad-client="ca-pub-6458870303612779" data-ad-slot="3092590903"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </center>
            <div class="flex items-center gap-4">
                <button class="p-2.5 rounded-full hover:bg-gray-50 transition-colors" onclick="window.location.href='index.html'">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-6 py-12">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
            <form id="adForm">
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Foto Iklan</label>
                        <input type="file" id="imageInput" accept="image/*" class="block w-full text-sm text-gray-500">
                        <div id="previewBox" class="mt-3 w-full h-52 bg-gray-50 rounded-lg border border-dashed border-gray-200 flex items-center justify-center">
                            <img id="previewImage" alt="Pratinjau" class="max-w-full max-h-full object-contain hidden">
                            <span id="previewText" class="text-gray-400">Pilih foto</span>
                        </div>
                    </div>

                    <div>
                        <label for="title" class="block text-sm font-medium text-gray-700 mb-2">Judul Iklan</label>
                        <input type="text" id="title" maxlength="80" required class="w-full px-4 py-3 border border-gray-200 rounded-lg">
                    </div>

                    <div>
                        <label for="category" class="block text-sm font-medium text-gray-700 mb-2">Kategori</label>
                        <select id="category" required class="w-full px-4 py-3 border border-gray-200 rounded-lg">
                            <option value="">Pilih Kategori</option>
                            <option>Mobil</option><option>Motor</option><option>Properti</option>
                            <option>Elektronik</option><option>Lowongan</option><option>Jasa</option>
                            <option>Hobi</option><option>Fashion</option><option>Lainnya</option>
                        </select>
                    </div>

                    <div>
                        <label for="location" class="block text-sm font-medium text-gray-700 mb-2">Lokasi / Kota</label>
                        <input type="text" id="location" required class="w-full px-4 py-3 border border-gray-200 rounded-lg">
                    </div>

                    <div>
                        <label for="whatsapp" class="block text-sm font-medium text-gray-700 mb-2">Nomor WhatsApp</label>
                        <input type="text" id="whatsapp" placeholder="Contoh: 6281234567890" required class="w-full px-4 py-3 border border-gray-200 rounded-lg">
                    </div>

                    <div>
                        <label for="description" class="block text-sm font-medium text-gray-700 mb-2">Deskripsi Iklan</label>
                        <textarea id="description" maxlength="500" required rows="4" class="w-full px-4 py-3 border border-gray-200 rounded-lg resize-none"></textarea>
                        <div id="charCount" class="text-right text-sm text-gray-500 mt-1">0 / 500</div>
                    </div>

                    <div id="secretGroup">
                        <label for="secretCode" class="block text-sm font-medium text-gray-700 mb-2">Kode Kelola</label>
                        <input type="text" id="secretCode" placeholder="Masukkan kode rahasia" class="w-full px-4 py-3 border border-gray-200 rounded-lg">
                        <p class="mt-1 text-sm text-gray-500">Didapat saat pertama pasang iklan</p>
                    </div>

                    <div class="flex flex-col gap-3 pt-4">
                        <button type="submit" id="btnKirim" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg">✅ Pasang Iklan</button>
                        <button type="button" id="btnEdit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg">✏️ Simpan Perubahan</button>
                        <button type="button" id="btnHapus" class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-lg">🗑️ Hapus Iklan</button>
                    </div>

                    <div id="statusBox" class="mt-4 p-4 rounded-lg text-center hidden"></div>
                </div>
            </form>
        </div>
    </main>

    <script>lucide.createIcons();</script>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzwXBjQbOoHjb5btAFrja7llCgXT1KahBrI2-OyrfERGYy2XXkeXJxNNhdKyupqI6TK7w/exec";
        let idIklanDikelola = null;

        // === JALANKAN SEKARANG, TIDAK TUNGU LAIN ===
        const params = new URLSearchParams(window.location.search);
        idIklanDikelola = params.get('kelola');

        if (idIklanDikelola) {
            // === JIKA ADA ID, TAMBAHKAN KELAS KE BADAN HALAMAN ===
            document.body.classList.add('kelola-mode');
            console.log("✅ MODE KELOLA AKTIF! ID:", idIklanDikelola);
        } else {
            console.log("ℹ️ MODE PASANG BARU");
        }

        // === FUNGSI LAINNYA ===
        function tampilkanPesan(jenis, teks) {
            const kotak = document.getElementById('statusBox');
            kotak.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-green-50', 'text-green-700');
            kotak.classList.add(jenis === 'error' ? 'bg-red-50', 'text-red-700' : 'bg-green-50', 'text-green-700');
            kotak.textContent = teks;
            kotak.classList.remove('hidden');
        }

        // === PRATINJAU GAMBAR ===
        const imageInput = document.getElementById('imageInput');
        const previewImage = document.getElementById('previewImage');
        const previewText = document.getElementById('previewText');
        imageInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) { previewImage.classList.add('hidden'); previewText.classList.remove('hidden'); return; }
            const reader = new FileReader();
            reader.onload = e => { previewImage.src = e.target.result; previewImage.classList.remove('hidden'); previewText.classList.add('hidden'); };
            reader.readAsDataURL(file);
        });

        // === HITUNG KARAKTER ===
        const deskripsi = document.getElementById('description');
        const hitungKarakter = document.getElementById('charCount');
        deskripsi.addEventListener('input', () => {
            const jumlah = deskripsi.value.length;
            hitungKarakter.textContent = `${jumlah} / 500`;
        });

        // === AMBIL DATA JIKA MODE KELOLA ===
        async function ambilDataIklan() {
            if (!idIklanDikelola) return;
            try {
                const res = await fetch(`${API_URL}?action=detail&id=${encodeURIComponent(idIklanDikelola)}`);
                const data = await res.json();
                if (!data.success) throw new Error(data.error || 'Iklan tidak ditemukan');
                const iklan = data.ad;
                document.getElementById('title').value = iklan.title || '';
                document.getElementById('category').value = iklan.category || '';
                document.getElementById('location').value = iklan.location || '';
                document.getElementById('whatsapp').value = iklan.whatsapp || '';
                document.getElementById('description').value = iklan.description || '';
                hitungKarakter.textContent = `${iklan.description?.length || 0} / 500`;
            } catch (err) {
                tampilkanPesan('error', 'Gagal memuat data: ' + err.message);
            }
        }

        // === TOMBOL EDIT ===
        document.getElementById('btnEdit').addEventListener('click', async () => {
            const kode = document.getElementById('secretCode').value.trim();
            if (!kode) return tampilkanPesan('error', 'Masukkan Kode Kelola dulu!');
            try {
                const url = new URLSearchParams();
                url.append('action', 'updateAd'); url.append('id', idIklanDikelola); url.append('secret_code', kode);
                url.append('title', document.getElementById('title').value.trim()); url.append('category', document.getElementById('category').value);
                url.append('location', document.getElementById('location').value.trim()); url.append('description', document.getElementById('description').value.trim());
                const res = await fetch(`${API_URL}?${url.toString()}`);
                const hasil = await res.json();
                if (hasil.success) {
                    tampilkanPesan('sukses', '✅ Iklan diperbarui!');
                    setTimeout(() => window.location.href = `iklan-saya.html?id=${idIklanDikelola}`, 2000);
                } else {
                    tampilkanPesan('error', '❌ ' + (hasil.error || 'Kode salah!'));
                }
            } catch (err) { tampilkanPesan('error', 'Gagal terhubung server!'); }
        });

        // === TOMBOL HAPUS ===
        document.getElementById('btnHapus').addEventListener('click', async () => {
            const kode = document.getElementById('secretCode').value.trim();
            if (!kode) return tampilkanPesan('error', 'Masukkan Kode Kelola dulu!');
            if (!confirm('⚠️ Yakin hapus? Tidak bisa dibatalkan!')) return;
            try {
                const url = new URLSearchParams();
                url.append('action', 'deleteAd'); url.append('id', idIklanDikelola); url.append('secret_code', kode);
                const res = await fetch(`${API_URL}?${url.toString()}`);
                const hasil = await res.json();
                if (hasil.success) {
                    tampilkanPesan('sukses', '✅ Iklan dihapus!');
                    setTimeout(() => window.location.href = 'index.html', 2000);
                } else {
                    tampilkanPesan('error', '❌ ' + (hasil.error || 'Kode salah!'));
                }
            } catch (err) { tampilkanPesan('error', 'Gagal terhubung server!'); }
        });

        // === MULAI ===
        document.addEventListener('DOMContentLoaded', ambilDataIklan);
    </script>
</body>
</html>
