<!DOCTYPE html>
<html lang="id-ID">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasang & Kelola Iklan - Rewang Iklan</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.424.0/dist/umd/lucide.min.js"></script>

    <style>
        /* PERATURAN TOMBOL YANG TIDAK BISA DITIMPA */
        #btnPasang { display: block !important; }
        #btnEdit, #btnHapus, #kodeKelolaGrup { display: none !important; }

        body.mode-kelola #btnPasang { display: none !important; }
        body.mode-kelola #btnEdit, body.mode-kelola #btnHapus, body.mode-kelola #kodeKelolaGrup { display: block !important; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800">

<!-- HEADER -->
<header class="sticky top-0 bg-white shadow-sm z-50">
    <div class="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-2 text-gray-700 hover:text-blue-600">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
            <span class="font-medium">Kembali</span>
        </a>
        <h1 class="text-lg font-bold" id="judulHalaman">Pasang Iklan Baru</h1>
        <div class="w-16"></div>
    </div>
</header>

<!-- KONTEN UTAMA -->
<main class="max-w-2xl mx-auto px-4 py-6">
    <div class="bg-white rounded-xl shadow-sm p-6">
        <form id="formIklan" class="space-y-5">

            <!-- FOTO IKLAN DENGAN PRATINJAU -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Foto Iklan</label>
                <input type="file" id="inputFoto" accept="image/*" class="block w-full text-sm text-gray-500 file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                <p class="mt-1 text-xs text-gray-500">Format JPG/PNG, ukuran maksimal 5MB</p>
                <div id="kotakPratinjau" class="mt-3 w-full h-52 bg-gray-50 border-2 border-dashed border-gray-200 rounded-lg flex items-center justify-center overflow-hidden">
                    <img id="gambarPratinjau" alt="Pratinjau Foto" class="max-w-full max-h-full object-contain hidden">
                    <span id="teksPratinjau" class="text-gray-400">Foto iklan akan muncul di sini</span>
                </div>
            </div>

            <!-- JUDUL IKLAN -->
            <div>
                <label for="inputJudul" class="block text-sm font-medium text-gray-700 mb-2">Judul Iklan *</label>
                <input type="text" id="inputJudul" maxlength="80" required placeholder="Contoh: Rumah Minimalis Dekat Kota" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <!-- KATEGORI -->
            <div>
                <label for="inputKategori" class="block text-sm font-medium text-gray-700 mb-2">Kategori *</label>
                <select id="inputKategori" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                    <option value="">Pilih Kategori Iklan</option>
                    <option>Mobil</option>
                    <option>Motor</option>
                    <option>Properti</option>
                    <option>Elektronik & Gadget</option>
                    <option>Lowongan Kerja</option>
                    <option>Jasa & Layanan</option>
                    <option>Hobi & Olahraga</option>
                    <option>Fashion & Aksesoris</option>
                    <option>Lainnya</option>
                </select>
            </div>

            <!-- LOKASI -->
            <div>
                <label for="inputLokasi" class="block text-sm font-medium text-gray-700 mb-2">Lokasi / Kota *</label>
                <input type="text" id="inputLokasi" required placeholder="Contoh: Surabaya, Jawa Timur" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <!-- NOMOR WHATSAPP -->
            <div>
                <label for="inputWa" class="block text-sm font-medium text-gray-700 mb-2">Nomor WhatsApp *</label>
                <input type="text" id="inputWa" required placeholder="Contoh: 6281234567890" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <!-- DESKRIPSI -->
            <div>
                <label for="inputDeskripsi" class="block text-sm font-medium text-gray-700 mb-2">Deskripsi Iklan *</label>
                <textarea id="inputDeskripsi" maxlength="500" required rows="4" placeholder="Jelaskan detail barang atau jasa Anda..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none"></textarea>
                <div class="flex justify-between items-center mt-1">
                    <span class="text-xs text-gray-500">Maksimal 500 karakter</span>
                    <span id="jumlahKarakter" class="text-xs text-gray-500">0 / 500</span>
                </div>
            </div>

            <!-- KODE KELOLA (HANYA MUNCUL SAAT EDIT) -->
            <div id="kodeKelolaGrup">
                <label for="inputKode" class="block text-sm font-medium text-gray-700 mb-2">Kode Kelola Iklan *</label>
                <input type="text" id="inputKode" required placeholder="Masukkan kode rahasia yang Anda dapatkan sebelumnya" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                <p class="mt-1 text-xs text-gray-500">Kode ini diberikan saat pertama kali Anda memasang iklan</p>
            </div>

            <!-- TOMBOL AKSI -->
            <div class="space-y-3 pt-4">
                <button type="submit" id="btnPasang" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors">✅ Pasang Iklan Sekarang</button>
                <button type="button" id="btnEdit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition-colors">✏️ Simpan Perubahan Iklan</button>
                <button type="button" id="btnHapus" class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-lg transition-colors">🗑️ Hapus Iklan Permanen</button>
            </div>

            <!-- PESAN STATUS -->
            <div id="kotakPesan" class="mt-4 p-4 rounded-lg text-center hidden"></div>
        </form>
    </div>
</main>

<script>
lucide.createIcons();

// === 1. ATUR MODE: PASANG ATAU KELOLA ===
const parameterUrl = new URLSearchParams(window.location.search);
const adaIdIklan = parameterUrl.has('kelola');

if (adaIdIklan) {
    document.body.classList.add('mode-kelola');
    document.getElementById('judulHalaman').textContent = 'Edit Iklan Saya';
}

// === 2. PRATINJAU GAMBAR BERJALAN ===
const inputFoto = document.getElementById('inputFoto');
const gambarPratinjau = document.getElementById('gambarPratinjau');
const teksPratinjau = document.getElementById('teksPratinjau');

inputFoto.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) {
        gambarPratinjau.classList.add('hidden');
        teksPratinjau.classList.remove('hidden');
        return;
    }
    const pembaca = new FileReader();
    pembaca.onload = function(e) {
        gambarPratinjau.src = e.target.result;
        gambarPratinjau.classList.remove('hidden');
        teksPratinjau.classList.add('hidden');
    }
    pembaca.readAsDataURL(file);
});

// === 3. HITUNG KARAKTER DESKRIPSI ===
const inputDeskripsi = document.getElementById('inputDeskripsi');
const jumlahKarakter = document.getElementById('jumlahKarakter');

inputDeskripsi.addEventListener('input', function() {
    const panjang = this.value.length;
    jumlahKarakter.textContent = `${panjang} / 500`;
    jumlahKarakter.classList.toggle('text-orange-500', panjang >= 450 && panjang < 500);
    jumlahKarakter.classList.toggle('text-red-500', panjang >= 500);
});
</script>
</body>
</html>
