<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
}
html, body {
    height: 100%;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-size: 16px;
}

:root {
    --item-per-page: 10;
}

/* === KONTAINER DAFTAR === */
.feed-container {
    height: 100%;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
    scroll-behavior: smooth;
    padding-bottom: 70px;
}
.feed-container::-webkit-scrollbar { display: none; }
.feed-container { -ms-overflow-style: none; scrollbar-width: none; }

/* === KARTU IKLAN === */
.ad-card {
    position: relative;
    width: 100%;
    height: 100vh;
    scroll-snap-align: start;
    overflow: hidden;
    background: #000;
    display: flex;
    flex-direction: column;
}

/* ✅ EFEK CAHAYA SPOTLIGHT DARI ATAS */
.spotlight {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 25%;
    background: radial-gradient(ellipse 130% 70% at 50% 0%, 
        rgba(255,255,245,0.22) 0%, 
        rgba(255,255,255,0.06) 45%, 
        transparent 75%);
    pointer-events: none;
    z-index: 2;
}

/* ✅ GAMBAR UTAMA TETAP TAJAM */
.ad-image {
    width: 100%;
    height: 25%;
    min-height: 320px;
    object-fit: cover;
    object-position: center top;
    transition: transform 0.3s ease;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
    -ms-interpolation-mode: bicubic;
    transform: translateZ(0);
    backface-visibility: hidden;
    z-index: 1;
}

/* ✅ PANTULAN DIPERLUAS SAMPAI BAWAH, TIDAK TERBATAS */
.reflection-glass {
    position: absolute;
    top: 0; /* Mulai persis di bawah gambar utama */
    left: 0;
    right: 0;
    height: 75%; /* ✅ DARI 28% DIUBAH JADI 75% → MEMENUHI SELURUH SISA LAYAR KE BAWAH */
    background-position: center top;
    background-size: 100% auto;
    background-repeat: no-repeat;
    transform: scaleY(-1);
    filter: blur(1.5px) brightness(0.7) saturate(1);
    opacity: 0.7;
    mask-image: linear-gradient(to bottom, 
        rgba(0,0,0,1) 0%, 
        rgba(0,0,0,0.7) 40%, 
        rgba(0,0,0,0.3) 70%,
        transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, 
        rgba(0,0,0,1) 0%, 
        rgba(0,0,0,0.7) 40%, 
        rgba(0,0,0,0.3) 70%,
        transparent 100%);
    pointer-events: none;
    z-index: 2;
}

/* ✅ LAPISAN GELAP DIPERBAIKI SESUAI LUAS PANTULAN */
.fade-overlay {
    position: absolute;
    top: 25%;
    left: 0;
    right: 0;
    height: 75%; /* ✅ SAMA DENGAN TINGGI PANTULAN */
    background: linear-gradient(to bottom, 
        rgba(0,0,0,0) 0%, 
        rgba(0,0,0,0.02) 30%,
        rgba(0,0,0,0.2) 60%,
        rgba(0,0,0,0.5) 100%);
    pointer-events: none;
    z-index: 3;
}
    
/* ✅ JUDUL DI BAWAH, TIDAK TEBAL */
.ad-title {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-size: 1.6rem;
    font-weight: 400;
    color: #ffffff;
    letter-spacing: 0.5px;
    text-shadow: 0 1px 5px rgba(0,0,0,0.7);
    z-index: 4;
    width: 92%;
    line-height: 1.4;
}

/* === TOMBOL TENGAH === */
.center-action {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.9);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    z-index: 10;
    box-shadow: 0 0 30px rgba(0,0,0,0.4);
}
.center-action i { color: #2563EB; width: 32px; height: 32px; margin-left: 4px; }
.center-action:hover { transform: translate(-50%, -50%) scale(1.1); background: #fff; }
.play-mode .center-action { opacity: 0; pointer-events: none; }

/* ✅ TOMBOL SAMPING TETAP DI POSISI TENGAH, TIDAK TERGESER */
.side-actions {
    position: absolute;
    right: 40px;
    top: 52%; /* ✅ Sedikit diturunkan biar pas di tengah area pantulan */
    display: flex;
    flex-direction: column;
    gap: 36px;
    align-items: center;
    z-index: 10;
    transition: opacity 0.3s ease;
}
    
.play-mode .side-actions { opacity: 0; pointer-events: none; }
.side-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: transform 0.2s ease;
}
.side-btn i { width: 28px; height: 28px; color: #fff; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
.side-btn span { font-size: 11px; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
.side-btn:hover { transform: scale(1.1); }

/* === PANEL DETAIL IKLAN SAYA === */
.detail-overlay {
    position: fixed;
    top: 0;
    right: 0;
    width: 100%;
    height: 100%;
    background: #111827;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    z-index: 100;
    overflow-y: auto;
    padding-bottom: 90px;
}
.detail-overlay.show { transform: translateX(0); }
.detail-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: #1F2937;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    color: #9CA3AF;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
}
.detail-close:hover { background: #374151; color: #fff; }
.detail-main-img {
    width: 100%;
    height: 280px;
    background: #1F2937;
    background-size: cover;
    background-position: center;
    margin-top: 60px;
}
.detail-content { padding: 20px; }
.detail-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.detail-desc { line-height: 1.6; color: #D1D5DB; margin: 16px 0 24px; white-space: pre-line; }
.btn-wa, .btn-manage {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 10px;
    transition: background 0.2s ease;
}
.btn-wa { background: #25D366; color: white; }
.btn-wa:hover { background: #1DA851; }
.btn-manage { background: #F59E0B; color: white; }
.btn-manage:hover { background: #D97706; }

/* === TOMBOL MUAT LEBIH BANYAK === */
.load-more-wrapper {
    position: relative;
    width: 100%;
    padding: 30px 20px 50px;
    display: flex;
    justify-content: center;
    scroll-snap-align: start;
}
.load-more-btn {
    padding: 14px 32px;
    background: #2563EB;
    color: white;
    border: none;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
}
.load-more-btn:hover { background: #1D4ED8; transform: translateY(-2px); }
.load-more-btn:disabled { background: #4B5563; cursor: not-allowed; transform: none; }
.empty-state {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: #9CA3AF;
    text-align: center;
    padding: 20px;
    scroll-snap-align: start;
}
.empty-state i { width: 64px; height: 64px; opacity: 0.5; }

/* === NAVIGASI BAWAH === */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 70px;
    background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
    display: flex;
    justify-content: space-around;
    align-items: center;
    z-index: 9;
    transition: opacity 0.3s ease;
}
.play-mode .bottom-nav { opacity: 0; pointer-events: none; }
.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: #9CA3AF;
    cursor: pointer;
    transition: color 0.2s ease;
}
.nav-item.active { color: #fff; }
.nav-item i { width: 22px; height: 22px; }
.nav-item span { font-size: 12px; }

/* === KOTAK PENCARIAN === */
.search-bar {
    position: fixed;
    top: 16px;
    left: 16px;
    right: 16px;
    background: rgba(17,24,39,0.95);
    backdrop-filter: blur(12px);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transform: translateY(-120%);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 50;
}
.search-bar.show { transform: translateY(0); opacity: 1; }
.search-bar input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #fff;
    font-size: 15px;
}
.search-bar input::placeholder { color: #6B7280; }
.search-bar i { color: #6B7280; width: 20px; height: 20px; flex-shrink: 0; }
.search-clear {
    background: none;
    border: none;
    color: #6B7280;
    cursor: pointer;
    padding: 4px;
    display: none;
}
.search-clear.show { display: block; }

/* === FORM PASANG IKLAN === */
.ad-form-overlay {
    position: fixed;
    top: 0;
    right: 0;
    width: 100%;
    height: 100%;
    background: #111827;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    z-index: 101;
    overflow-y: auto;
    padding-bottom: 90px;
}
.ad-form-overlay.show { transform: translateX(0); }
.form-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: #1F2937;
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    color: #9CA3AF;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
}
.form-close:hover { background: #374151; color: #fff; }
.form-header {
    padding: 60px 20px 20px;
    border-bottom: 1px solid #374151;
}
.form-header h4 { font-size: 18px; font-weight: 600; }
.form-content { padding: 20px; }
.form-layout { display: flex; flex-direction: column; gap: 20px; }
.upload-side, .data-side { display: flex; flex-direction: column; gap: 12px; }
.upload-title { font-size: 15px; font-weight: 500; }
.help { font-size: 12px; color: #9CA3AF; }
.preview-box {
    width: 100%;
    height: 180px;
    background: #1F2937;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}
.preview-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 14px; color: #E5E7EB; }
.form-group input, .form-group select, .form-group textarea {
    padding: 12px;
    background: #1F2937;
    border: 1px solid #374151;
    border-radius: 8px;
    color: #fff;
    font-size: 15px;
}
.form-group textarea { min-height: 100px; resize: vertical; }
.char-count { font-size: 12px; color: #9CA3AF; text-align: right; }
.form-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
.form-buttons button {
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s ease;
}
.btn-kirim { background: #2563EB; color: white; }
.btn-kirim:hover { background: #1D4ED8; }
.btn-edit { background: #10B981; color: white; display: none; }
.btn-edit.show { display: block; }
.btn-hapus { background: #EF4444; color: white; display: none; }
.btn-hapus.show { display: block; }
.status-box { margin-top: 15px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }

/* === PETUNJUK === */
.play-hint {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    text-shadow: 0 1px 3px rgba(0,0,0,0.7);
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
    z-index: 8;
}
.play-mode .play-hint { opacity: 1; }

    /* ✅ GAYA UMUM SEMUA TOMBOL: SERAGAM, TIDAK WARNA-WARNI */
button,
.btn-wa,
.btn-manage,
.btn-kirim,
.btn-edit,
.btn-hapus,
.load-more-btn,
.detail-close,
.form-close,
.search-clear {
    background: rgba(17, 24, 39, 0.75) !important; /* Latar gelap transparan */
    color: #ffffff !important; /* Teks putih */
    border: 1px solid rgba(255, 255, 255, 0.18) !important; /* Garis pinggir samar putih */
    box-shadow: 0 0 14px rgba(255, 255, 255, 0.25), 
                inset 0 0 8px rgba(255, 255, 255, 0.05) !important; /* Bayangan luar putih */
    backdrop-filter: blur(10px); /* Efek kaca */
    transition: all 0.15s ease !important;
    font-weight: 500 !important;
}

/* ✅ SAAT DIKLIK / DITEKAN: TERTEKAN MASUK, BAYANGAN MENIPIS */
button:active,
.btn-wa:active,
.btn-manage:active,
.btn-kirim:active,
.btn-edit:active,
.btn-hapus:active,
.load-more-btn:active {
    transform: scale(0.97) translateY(1px) !important; /* Efek masuk ke dalam */
    box-shadow: 0 0 6px rgba(255, 255, 255, 0.12), 
                inset 0 2px 4px rgba(0, 0, 0, 0.3) !important; /* Bayangan mengecil */
    background: rgba(17, 24, 39, 0.9) !important;
}

/* ✅ SAAT DIARAHKAN KURSOR: BAYANGAN SEDIKIT BERTAMBAH */
button:hover,
.btn-wa:hover,
.btn-manage:hover,
.btn-kirim:hover,
.btn-edit:hover,
.btn-hapus:hover,
.load-more-btn:hover {
    box-shadow: 0 0 18px rgba(255, 255, 255, 0.32), 
                inset 0 0 10px rgba(255, 255, 255, 0.08) !important;
    background: rgba(31, 41, 55, 0.75) !important;
}

/* ✅ TOMBOL DINONAKTIFKAN */
.load-more-btn:disabled {
    opacity: 0.5 !important;
    cursor: not-allowed !important;
    box-shadow: 0 0 6px rgba(255, 255, 255, 0.1) !important;
}
</style>

<body>

    <!-- Kotak Pencarian -->
    <div class="search-bar" id="searchBar">
        <i data-lucide="search"></i>
        <input type="text" id="searchInput" placeholder="Cari nama, kategori, lokasi...">
        <button class="search-clear" id="searchClear">
            <i data-lucide="x"></i>
        </button>
    </div>

    <!-- Daftar Iklan -->
    <div class="feed-container" id="feedContainer">
        <div class="empty-state">
            <i data-lucide="loader-2"></i>
            <p>Memuat iklan...</p>
        </div>
    </div>

    <!-- PANEL DETAIL IKLAN SAYA -->
    <div class="detail-overlay" id="detailOverlay">
        <button class="detail-close" onclick="tutupDetailIklan()">
            <i data-lucide="x"></i>
        </button>
        <div class="detail-main-img" id="detailImg"></div>
        <div class="detail-content">
            <h2 class="detail-title" id="detailTitle"></h2>
            <p style="color:#9CA3AF; margin-bottom:8px;">Kategori: <span id="detailCat"></span></p>
            <p style="color:#9CA3AF; margin-bottom:8px;">📍 <span id="detailLoc"></span></p>
            <p style="color:#9CA3AF; margin-bottom:12px;">👁️ Dilihat <span id="detailViews"></span> kali</p>
            <div class="detail-desc" id="detailDesc"></div>
            <button class="btn-wa" id="btnWa">💬 Hubungi via WhatsApp</button>
            <button class="btn-manage" onclick="bukaEditIklan()">⚙️ Kelola / Edit / Hapus Iklan</button>
        </div>
    </div>

    <!-- FORM PASANG IKLAN DARI KANAN -->
    <div class="ad-form-overlay" id="adFormOverlay">
        <button class="form-close" onclick="tutupFormIklan()">
            <i data-lucide="x"></i>
        </button>
        <div class="form-header">
            <h4 id="formTitle">Pasang Iklan Baru</h4>
        </div>
        <div class="form-content">
            <form id="adForm">
                <div class="form-layout">
                    <div class="upload-side">
                        <label class="upload-title">Foto Iklan</label>
                        <input type="file" id="imageInput" accept="image/*">
                        <p class="help">Format JPG/PNG, otomatis diubah ke WebP</p>
                        <div class="preview-box">
                            <img id="previewImage" alt="Pratinjau Gambar">
                        </div>
                    </div>
                    <div class="data-side">
                        <div class="form-group">
                            <label>Judul Iklan</label>
                            <input type="text" id="title" maxlength="80" required>
                        </div>
                        <div class="form-group">
                            <label>Kategori</label>
                            <select id="category" required>
                                <option value="">Pilih Kategori</option>
                                <option>Mobil</option>
                                <option>Motor</option>
                                <option>Properti</option>
                                <option>Elektronik</option>
                                <option>Lowongan</option>
                                <option>Jasa</option>
                                <option>Hobi</option>
                                <option>Fashion</option>
                                <option>Lainnya</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Lokasi / Kota</label>
                            <input type="text" id="location" required>
                        </div>
                        <div class="form-group">
                            <label>Nomor WhatsApp</label>
                            <input type="text" id="whatsapp" placeholder="Contoh: 6281234567890" required>
                        </div>
                        <div class="form-group">
                            <label>Deskripsi Iklan</label>
                            <textarea id="description" maxlength="500" required></textarea>
                            <div id="charCount" class="char-count">0 / 500</div>
                        </div>
                        <div class="form-group" id="secretGroup" style="display:none;">
                            <label>Kode Kelola</label>
                            <input type="text" id="secretCode" placeholder="Masukkan kode rahasia Anda">
                            <p class="help">Kode ini didapat saat pertama kali pasang iklan</p>
                        </div>
                    </div>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="btn-kirim" id="btnKirim">✅ Pasang Iklan</button>
                    <button type="button" class="btn-edit" id="btnEdit">✏️ Simpan Perubahan</button>
                    <button type="button" class="btn-hapus" id="btnHapus">🗑️ Hapus Iklan</button>
                </div>
            </form>
            <div id="statusBox" class="status-box"></div>
        </div>
    </div>

    <!-- NAVIGASI BAWAH -->
<nav class="bottom-nav">
    <div class="nav-item" id="navSearch">
        <i data-lucide="search"></i>
        <span>Search</span>
    </div>
    <div class="nav-item" id="navInstall">
        <i data-lucide="download"></i>
        <span>Add</span>
    </div>
    <div class="nav-item" id="navTop">
        <i data-lucide="arrow-up-to-line"></i>
        <span>Back To Top</span>
    </div>
</nav>

    <div class="play-hint">Sentuh layar atau gulir untuk kembali</div>

    <script>
        lucide.createIcons();

// === KONFIGURASI UTAMA ===
const API_URL = "https://script.google.com/macros/s/AKfycbzwXBjQbOoHjb5btAFrja7llCgXT1KahBrI2-OyrfERGYy2XXkeXJxNNhdKyupqI6TK7w/exec";
const ITEM_PER_PAGE = 10;
let allAds = [];
let displayAds = [];
let currentDisplayCount = 0;
let activeAd = null;
let editMode = false;

// === ELEMEN HALAMAN ===
const body = document.body;
const feedContainer = document.getElementById('feedContainer');
const searchBar = document.getElementById('searchBar');
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const navSearch = document.getElementById('navSearch');
const navTop = document.getElementById('navTop');
const navInstall = document.getElementById('navInstall');
const detailOverlay = document.getElementById('detailOverlay');
const adFormOverlay = document.getElementById('adFormOverlay');
const formTitle = document.getElementById('formTitle');
const btnKirim = document.getElementById('btnKirim');
const btnEdit = document.getElementById('btnEdit');
const btnHapus = document.getElementById('btnHapus');

// === FITUR INSTAL APLIKASI PWA ===
let deferredPrompt;
// JANGAN tulis ulang "const navInstall" di sini! Sudah ada di atas
const installIcon = navInstall?.querySelector('i');
const installText = navInstall?.querySelector('span');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    // Cek dulu biar tidak error "null"
    if (installIcon) {
        installIcon.setAttribute('data-lucide', 'download');
    }
    if (installText) {
        installText.textContent = 'Instal Aplikasi';
    }
    lucide.createIcons({ context: navInstall });
});

navInstall.addEventListener('click', async () => {
    if (!deferredPrompt) {
        window.location.href = 'https://rewangiklan.my.id/';
        return;
    }
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log(`Status instalasi: ${outcome}`);
    deferredPrompt = null;
});

window.addEventListener('appinstalled', () => {
    deferredPrompt = null;
    if (installIcon) {
        installIcon.setAttribute('data-lucide', 'home');
    }
    if (installText) {
        installText.textContent = 'Beranda';
    }
    lucide.createIcons({ context: navInstall });
});

// === AMBIL DATA IKLAN DARI SERVER ===
async function ambilDataIklan() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();
        allAds = data.filter(item => item.status === 'aktif').reverse();
        displayAds = [...allAds];
        tampilkanAwal();
        feedContainer.addEventListener('scroll', deteksiIklanAktif);
    } catch (err) {
        feedContainer.innerHTML = `<div class="empty-state"><i data-lucide="alert-triangle"></i><p>Gagal memuat iklan, coba lagi nanti</p></div>`;
        lucide.createIcons({ context: feedContainer });
    }
}

// === DETEKSI IKLAN YANG SEDANG TERLIHAT DI LAYAR ===
function deteksiIklanAktif() {
    const kartuList = document.querySelectorAll('.ad-card');
    kartuList.forEach((kartu, indeks) => {
        const posisi = kartu.getBoundingClientRect();
        if (posisi.top >= 0 && posisi.top <= window.innerHeight / 2) {
            activeAd = displayAds[indeks];
        }
    });
}

// === TAMPILKAN DAFTAR IKLAN PERTAMA ===
function tampilkanAwal() {
    feedContainer.innerHTML = '';
    currentDisplayCount = 0;
    tambahIklan(0, ITEM_PER_PAGE);
    tambahTombolMuat();
}

// === TAMBAH IKLAN KE DAFTAR (SUDAH BERSIH & PANTULAN MUNCUL) ===
function tambahIklan(dari, sampai) {
    const batas = Math.min(sampai, displayAds.length);
    for (let i = dari; i < batas; i++) {
        const iklan = displayAds[i];
        const kartu = document.createElement('div');
        kartu.className = 'ad-card';
        
        kartu.innerHTML = `
            <div class="spotlight"></div>
            <img src="${iklan.image || 'https://picsum.photos/id/1040/800/1400'}" alt="${iklan.title}" class="ad-image" loading="lazy">
            <div class="reflection-glass"></div>
            <div class="fade-overlay"></div>
            <h3 class="ad-title">${iklan.title || 'Tanpa Judul'}</h3>
            
            <div class="side-actions">
                <div class="side-btn" onclick="bukaFormIklan()">
                    <i data-lucide="plus-circle"></i>
                    <span>Pasang Iklan</span>
                </div>
                <div class="side-btn" onclick="bagikanIklan('${iklan.id}')">
                    <i data-lucide="share-2"></i>
                    <span>Bagikan</span>
                </div>
                <div class="side-btn" onclick="bukaDetailIklanSaya()">
                    <i data-lucide="image"></i>
                    <span>Iklan Saya</span>
                </div>
            </div>
        `;

        // Setel gambar pantulan dengan aman
        const urlGambar = iklan.image || 'https://picsum.photos/id/1040/800/1400';
        const pantulan = kartu.querySelector('.reflection-glass');
        if (pantulan) {
            pantulan.style.backgroundImage = `url('${urlGambar}')`;
            pantulan.style.backgroundSize = '100% auto';
            pantulan.style.backgroundPosition = 'center top';
            pantulan.style.backgroundRepeat = 'no-repeat';
        }

        feedContainer.appendChild(kartu);
    }
    currentDisplayCount = batas;
    lucide.createIcons({ context: feedContainer });
    if (displayAds.length > 0) activeAd = displayAds[0];
}
        
// === TOMBOL MUAT LEBIH BANYAK IKLAN ===
function tambahTombolMuat() {
    const tombolLama = document.getElementById('load-more-wrap');
    if (tombolLama) tombolLama.remove();
    if (currentDisplayCount >= displayAds.length) return;
    
    const wrap = document.createElement('div');
    wrap.id = 'load-more-wrap';
    wrap.className = 'load-more-wrapper';
    wrap.innerHTML = `<button class="load-more-btn" onclick="muatLagi()"><i data-lucide="plus-circle"></i> Muat Lebih Banyak</button>`;
    feedContainer.appendChild(wrap);
    lucide.createIcons({ context: wrap });
}

function muatLagi() {
    const tombol = document.querySelector('.load-more-btn');
    tombol.disabled = true;
    tombol.innerHTML = `<i data-lucide="loader-2" class="animate-spin"></i> Memuat...`;
    
    setTimeout(() => {
        tambahIklan(currentDisplayCount, currentDisplayCount + ITEM_PER_PAGE);
        tambahTombolMuat();
    }, 500);
}

// === BUKA DETAIL IKLAN SAYA ===
function bukaDetailIklanSaya() {
    if (!activeAd) return alert('Data iklan tidak ditemukan');
    
    document.getElementById('detailImg').style.backgroundImage = `url(${activeAd.image || 'https://picsum.photos/id/1040/800/1400'})`;
    document.getElementById('detailTitle').textContent = activeAd.title || 'Tanpa Judul';
    document.getElementById('detailCat').textContent = activeAd.category || 'Lainnya';
    document.getElementById('detailLoc').textContent = activeAd.location || 'Lokasi tidak diketahui';
    document.getElementById('detailViews').textContent = activeAd.views || '0';
    document.getElementById('detailDesc').textContent = activeAd.description || 'Tidak ada deskripsi tambahan';
    
    document.getElementById('btnWa').onclick = () => {
        const nomor = activeAd.whatsapp.toString().replace(/\D/g, '');
        const pesan = encodeURIComponent(`Halo, saya tertarik dengan iklan "${activeAd.title}" di Rewang Iklan.`);
        window.open(`https://wa.me/${nomor}?text=${pesan}`, '_blank');
    };
    
    detailOverlay.classList.add('show');
}

function tutupDetailIklan() {
    detailOverlay.classList.remove('show');
}

// === BUKA FORM EDIT IKLAN ===
function bukaEditIklan() {
    tutupDetailIklan();
    if (!activeAd) return;
    
    editMode = true;
    formTitle.textContent = 'Edit Iklan';
    btnKirim.style.display = 'none';
    btnEdit.classList.add('show');
    btnHapus.classList.add('show');
    
    document.getElementById('title').value = activeAd.title || '';
    document.getElementById('category').value = activeAd.category || '';
    document.getElementById('location').value = activeAd.location || '';
    document.getElementById('whatsapp').value = activeAd.whatsapp || '';
    document.getElementById('description').value = activeAd.description || '';
    document.getElementById('charCount').textContent = `${activeAd.description?.length || 0} / 500`;
    
    adFormOverlay.classList.add('show');
}

// === BUKA FORM PASANG IKLAN BARU ===
function bukaFormIklan() {
    editMode = false;
    formTitle.textContent = 'Pasang Iklan Baru';
    btnKirim.style.display = 'block';
    btnEdit.classList.remove('show');
    btnHapus.classList.remove('show');
    document.getElementById('adForm').reset();
    document.getElementById('charCount').textContent = '0 / 500';
    
    adFormOverlay.classList.add('show');
}

function tutupFormIklan() {
    adFormOverlay.classList.remove('show');
}

// === FITUR PENCARIAN ===
navSearch.addEventListener('click', () => {
    searchBar.classList.toggle('show');
    if (searchBar.classList.contains('show')) {
        setTimeout(() => searchInput.focus(), 100);
    } else {
        searchInput.value = '';
        tampilkanAwal();
    }
});

searchInput.addEventListener('input', () => {
    const kataKunci = searchInput.value.trim().toLowerCase();
    searchClear.classList.toggle('show', kataKunci !== '');
    
    if (!kataKunci) {
        displayAds = [...allAds];
        tampilkanAwal();
        return;
    }
    
    displayAds = allAds.filter(iklan => {
        return (iklan.title || '').toLowerCase().includes(kataKunci)
            || (iklan.category || '').toLowerCase().includes(kataKunci)
            || (iklan.location || '').toLowerCase().includes(kataKunci)
            || (iklan.description || '').toLowerCase().includes(kataKunci);
    });
    
    tampilkanAwal();
    
    if (displayAds.length === 0) {
        feedContainer.innerHTML = `<div class="empty-state"><i data-lucide="search-x"></i><p>Tidak ditemukan iklan untuk kata kunci "${kataKunci}"</p></div>`;
        lucide.createIcons({ context: feedContainer });
    }
});

searchClear.addEventListener('click', () => {
    searchInput.value = '';
    tampilkanAwal();
});

// === TOMBOL KEMBALI KE ATAS ===
navTop.addEventListener('click', () => {
    feedContainer.scrollTo({ top: 0, behavior: 'smooth' });
});

// === MODE TAMPILAN PENUH ===
function bukaDetail() {
    body.classList.add('play-mode');
    setTimeout(() => {
        document.addEventListener('click', () => body.classList.remove('play-mode'), { once: true });
    }, 100);
}

// === FITUR BAGIKAN ===
async function bagikanIklan(id) {
    if (!activeAd) return;
    
    const tautan = `https://rewangiklan.my.id/iklan-saya.html?id=${id}`;
    const dataBerbagi = {
        title: activeAd.title || 'Iklan dari Rewang Iklan',
        text: `Lihat iklan menarik ini: ${activeAd.title}`,
        url: tautan
    };
    
    try {
        if (navigator.share) {
            await navigator.share(dataBerbagi);
        } else {
            await navigator.clipboard.writeText(tautan);
            alert('Tautan iklan sudah disalin!');
        }
    } catch (err) {
        try {
            await navigator.clipboard.writeText(tautan);
            alert('Tautan iklan sudah disalin!');
        } catch {
            alert('Maaf, perangkat Anda tidak mendukung berbagi.');
        }
    }
}

// === MULAI MEMUAT SAAT HALAMAN SIAP ===
document.addEventListener('DOMContentLoaded', ambilDataIklan);

        // === CEK DAN BERITAHU PEMBARUAN VERSI ===
let versiBaruTersedia = false;

// Cek Service Worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
        try {
            const registrasi = await navigator.serviceWorker.register('/sw.js');
            
            // Cek kalau ada versi baru ditemukan
            registrasi.addEventListener('updatefound', () => {
                const pekerjaBaru = registrasi.installing;
                
                pekerjaBaru.addEventListener('statechange', () => {
                    // Kalau versi baru sudah siap dipakai
                    if (pekerjaBaru.state === 'installed' && navigator.serviceWorker.controller) {
                        versiBaruTersedia = true;
                        tampilkanNotifikasiPembaruan();
                    }
                });
            });

            // Cek pembaruan secara berkala tiap 1 jam
            setInterval(() => {
                registrasi.update();
            }, 60 * 60 * 1000);

        } catch (err) {
            console.log('Service Worker tidak aktif:', err);
        }
    });
}

// === TAMPILKAN NOTIFIKASI KE PENGGUNA ===
function tampilkanNotifikasiPembaruan() {
    const kotak = document.createElement('div');
    kotak.style.cssText = `
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(17,24,39,0.95);
        color: white;
        padding: 14px 20px;
        border-radius: 12px;
        box-shadow: 0 0 20px rgba(255,255,255,0.2);
        z-index: 99999;
        max-width: 90%;
        text-align: center;
        font-size: 14px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.15);
    `;

    kotak.innerHTML = `
        <div style="margin-bottom: 10px;">✅ Ada pembaruan aplikasi tersedia!</div>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button onclick="window.lokasiUlang()" style="padding:8px 16px; border:none; border-radius:8px; background:#2563EB; color:white; font-weight:500;">Muat Versi Baru</button>
            <button onclick="this.parentElement.parentElement.remove()" style="padding:8px 16px; border:none; border-radius:8px; background:rgba(255,255,255,0.1); color:white;">Nanti Saja</button>
        </div>
    `;

    document.body.appendChild(kotak);
}

// === FUNGSI UNTUK LANGSUNG GUNAKAN VERSI BARU ===
window.lokasiUlang = () => {
    if (navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({ type: 'SKIP_WAITING' });
    }
    window.location.reload(true); // true = ambil langsung dari server, bukan simpanan lama
};
    </script>
