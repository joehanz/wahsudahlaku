*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif}

.form-buttons{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.form-buttons button{padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s ease}
.btn-kirim{background:#2563EB;color:#fff}
.btn-kirim:hover{background:#1D4ED8}
.btn-edit{background:#10B981;color:#fff;display:none}
.btn-edit.show{display:block}
.btn-hapus{background:#EF4444;color:#fff;display:none}
.btn-hapus.show{display:block}
.status-box{margin-top:15px;padding:12px;border-radius:8px;font-size:14px;display:none}
.play-hint{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,.6);text-shadow:0 1px 3px rgba(0,0,0,.7);opacity:0;transition:opacity .3s ease;pointer-events:none;z-index:8}
.play-mode .play-hint{opacity:1}
button,.btn-wa,.btn-manage,.btn-kirim,.btn-edit,.btn-hapus,.load-more-btn,.detail-close,.form-close,.search-clear{background:rgba(17,24,39,.75)!important;color:#fff!important;border:1px solid rgba(255,255,255,.18)!important;box-shadow:0 0 14px rgba(255,255,255,.25),inset 0 0 8px rgba(255,255,255,.05)!important;backdrop-filter:blur(10px);transition:all .15s ease!important;font-weight:500!important}
button:active,.btn-wa:active,.btn-manage:active,.btn-kirim:active,.btn-edit:active,.btn-hapus:active,.load-more-btn:active{transform:scale(.97) translateY(1px)!important;box-shadow:0 0 6px rgba(255,255,255,.12),inset 0 2px 4px rgba(0,0,0,.3)!important;background:rgba(17,24,39,.9)!important}
button:hover,.btn-wa:hover,.btn-manage:hover,.btn-kirim:hover,.btn-edit:hover,.btn-hapus:hover,.load-more-btn:hover{box-shadow:0 0 18px rgba(255,255,255,.32),inset 0 0 10px rgba(255,255,255,.08)!important;background:rgba(31,41,55,.75)!important}
.load-more-btn:disabled{opacity:.5!important;cursor:not-allowed!important;box-shadow:0 0 6px rgba(255,255,255,.1)!important}

<body>
<div class="search-bar" id="searchBar"><i data-lucide="search"></i><input type="text" id="searchInput" placeholder="Cari nama, kategori, lokasi..."><button class="search-clear" id="searchClear"><i data-lucide="x"></i></button></div>
<div class="feed-container" id="feedContainer"><div class="empty-state"><i data-lucide="loader-2"></i><p>Memuat iklan...</p></div></div>
<div class="detail-overlay" id="detailOverlay"><button class="detail-close" onclick="tutupDetailIklan()"><i data-lucide="x"></i></button><div class="detail-main-img" id="detailImg"></div><div class="detail-content"><h2 class="detail-title" id="detailTitle"></h2><p style="color:#9CA3AF;margin-bottom:8px">Kategori: <span id="detailCat"></span></p><p style="color:#9CA3AF;margin-bottom:8px">📍 <span id="detailLoc"></span></p><p style="color:#9CA3AF;margin-bottom:12px">👁️ Dilihat <span id="detailViews"></span> kali</p><div class="detail-desc" id="detailDesc"></div><button class="btn-wa" id="btnWa">💬 Hubungi via WhatsApp</button><button class="btn-manage" onclick="bukaEditIklan()">⚙️ Kelola / Edit / Hapus Iklan</button></div></div>
<div class="ad-form-overlay" id="adFormOverlay"><button class="form-close" onclick="tutupFormIklan()"><i data-lucide="x"></i></button><div class="form-header"><h4 id="formTitle">Pasang Iklan Baru</h4></div><div class="form-content"><form id="adForm"><div class="form-layout"><div class="upload-side"><label class="upload-title">Foto Iklan</label><input type="file" id="imageInput" accept="image/*"><p class="help">Format JPG/PNG, otomatis diubah ke WebP</p><div class="preview-box"><img id="previewImage" alt="Pratinjau Gambar"></div></div><div class="data-side"><div class="form-group"><label>Judul Iklan</label><input type="text" id="title" maxlength="80" required></div><div class="form-group"><label>Kategori</label><select id="category" required><option value="">Pilih Kategori</option><option>Mobil</option><option>Motor</option><option>Properti</option><option>Elektronik</option><option>Lowongan</option><option>Jasa</option><option>Hobi</option><option>Fashion</option><option>Lainnya</option></select></div><div class="form-group"><label>Lokasi / Kota</label><input type="text" id="location" required></div><div class="form-group"><label>Nomor WhatsApp</label><input type="text" id="whatsapp" placeholder="Contoh: 6281234567890" required></div><div class="form-group"><label>Deskripsi Iklan</label><textarea id="description" maxlength="3000" required></textarea><div id="charCount" class="char-count">0 / 3000</div></div><div class="form-group" id="secretGroup" style="display:none"><label>Kode Kelola</label><input type="text" id="secretCode" placeholder="Masukkan kode rahasia Anda"><p class="help">Kode didapat saat pertama kali pasang iklan</p></div></div></div><div class="form-buttons"><button type="submit" class="btn-kirim" id="btnKirim">✅ Pasang Iklan</button><button type="button" class="btn-edit" id="btnEdit">✏️ Simpan Perubahan</button><button type="button" class="btn-hapus" id="btnHapus">🗑️ Hapus Iklan</button></div></form><div id="statusBox" class="status-box"></div></div></div>
<nav class="bottom-nav"><div class="nav-item" id="navSearch"><i data-lucide="search"></i><span>Search</span></div><div class="nav-item" id="navInstall"><i data-lucide="download"></i><span>Add</span></div><div class="nav-item" id="navTop"><i data-lucide="arrow-up-to-line"></i><span>Back To Top</span></div></nav>
<div class="play-hint">Sentuh layar atau gulir untuk kembali</div>
<script>
lucide.createIcons();
const API_URL="https://script.google.com/macros/s/AKfycbzwXBjQbOoHjb5btAFrja7llCgXT1KahBrI2-OyrfERGYy2XXkeXJxNNhdKyupqI6TK7w/exec";
const ITEM_PER_PAGE=26;
let allAds=[],displayAds=[],currentDisplayCount=0,activeAd=null,editMode=false,deferredPrompt;
const feedContainer=document.getElementById("feedContainer"),searchBar=document.getElementById("searchBar"),searchInput=document.getElementById("searchInput"),searchClear=document.getElementById("searchClear"),navSearch=document.getElementById("navSearch"),navTop=document.getElementById("navTop"),navInstall=document.getElementById("navInstall"),detailOverlay=document.getElementById("detailOverlay"),adFormOverlay=document.getElementById("adFormOverlay"),formTitle=document.getElementById("formTitle"),btnKirim=document.getElementById("btnKirim"),btnEdit=document.getElementById("btnEdit"),btnHapus=document.getElementById("btnHapus"),previewImage=document.getElementById("previewImage"),secretGroup=document.getElementById("secretGroup"),charCount=document.getElementById("charCount"),installIcon=navInstall?.querySelector("i"),installText=navInstall?.querySelector("span");

window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;if(installIcon)installIcon.setAttribute("data-lucide","download");if(installText)installText.textContent="Instal Aplikasi";lucide.createIcons({context:navInstall})});
navInstall.addEventListener("click",async()=>{if(!deferredPrompt)return window.location.href="https://rewangiklan.my.id/";deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null});
window.addEventListener("appinstalled",()=>{deferredPrompt=null;if(installIcon)installIcon.setAttribute("data-lucide","home");if(installText)installText.textContent="Beranda";lucide.createIcons({context:navInstall})});

async function ambilDataIklan(){try{const e=await fetch(API_URL),t=await e.json();allAds=t.filter(e=>e.status==="aktif").reverse();displayAds=[...allAds];tampilkanAwal();feedContainer.addEventListener("scroll",deteksiIklanAktif)}catch(e){feedContainer.innerHTML=`<div class="empty-state"><i data-lucide="alert-triangle"></i><p>Gagal memuat iklan</p></div>`;lucide.createIcons({context:feedContainer})}}
function deteksiIklanAktif(){document.querySelectorAll(".ad-card").forEach((e,t)=>{const i=e.getBoundingClientRect();i.top>=0&&i.top<=window.innerHeight/2&&(activeAd=displayAds[t])})}
function tampilkanAwal(){feedContainer.innerHTML="";currentDisplayCount=0;tambahIklan(0,ITEM_PER_PAGE);tambahTombolMuat()}
function tambahIklan(e,t){const i=Math.min(t,displayAds.length);for(let t=e;t<i;t++){const n=displayAds[t],s=document.createElement("div");s.className="ad-card";const o=n.image||"https://picsum.photos/id/1040/800/1400";s.innerHTML=`<div class="spotlight"></div><img src="${o}" alt="${n.title}" class="ad-image" loading="lazy"><div class="reflection-glass"></div><div class="fade-overlay"></div><h3 class="ad-title">${n.title||"Tanpa Judul"}</h3><div class="side-actions"><div class="side-btn" onclick="bukaFormIklan()"><i data-lucide="plus-circle"></i><span>Pasang Iklan</span></div><div class="side-btn" onclick="bagikanIklan('${n.id}')"><i data-lucide="share-2"></i><span>Bagikan</span></div><div class="side-btn" onclick="bukaDetailIklanSaya()"><i data-lucide="image"></i><span>Iklan Saya</span></div></div>`;const a=s.querySelector(".reflection-glass");if(a)a.style.backgroundImage=`url('${o}')`;feedContainer.appendChild(s)}currentDisplayCount=i;lucide.createIcons({context:feedContainer});displayAds.length>0&&(activeAd=displayAds[0])}
function tambahTombolMuat(){document.getElementById("load-more-wrap")?.remove();if(currentDisplayCount>=displayAds.length)return;const e=document.createElement("div");e.id="load-more-wrap";e.className="load-more-wrapper";e.innerHTML=`<button class="load-more-btn" onclick="muatLagi()"><i data-lucide="plus-circle"></i> Muat Lebih Banyak</button>`;feedContainer.appendChild(e);lucide.createIcons({context:e})}
function muatLagi(){const e=document.querySelector(".load-more-btn");e.disabled=!0;e.innerHTML=`<i data-lucide="loader-2" class="animate-spin"></i> Memuat...`;setTimeout(()=>{tambahIklan(currentDisplayCount,currentDisplayCount+ITEM_PER_PAGE);tambahTombolMuat()},500)}

function bukaDetailIklanSaya(){if(!activeAd)return alert("Data tidak ditemukan");document.getElementById("detailImg").style.backgroundImage=`url(${activeAd.image||"https://picsum.photos/id/1040/800/1400"})`;document.getElementById("detailTitle").textContent=activeAd.title||"Tanpa Judul";document.getElementById("detailCat").textContent=activeAd.category||"Lainnya";document.getElementById("detailLoc").textContent=activeAd.location||"Tidak diketahui";document.getElementById("detailViews").textContent=activeAd.views||"0";document.getElementById("detailDesc").textContent=activeAd.description||"Tidak ada deskripsi";document.getElementById("btnWa").onclick=()=>{const e=activeAd.whatsapp.toString().replace(/\D/g,""),t=encodeURIComponent(`Halo, tertarik dengan iklan "${activeAd.title}"`);window.open(`https://wa.me/${e}?text=${t}`,"_blank")};detailOverlay.classList.add("show")}
function tutupDetailIklan(){detailOverlay.classList.remove("show")}

async function bukaEditIklan(){tutupDetailIklan();if(!activeAd)return;editMode=!0;formTitle.textContent="Edit Iklan";btnKirim.style.display="none";btnEdit.classList.add("show");btnHapus.classList.add("show");secretGroup.style.display="flex";document.getElementById("title").value=activeAd.title||"";document.getElementById("category").value=activeAd.category||"";document.getElementById("location").value=activeAd.location||"";document.getElementById("whatsapp").value=activeAd.whatsapp||"";document.getElementById("description").value=activeAd.description||"";charCount.textContent=`${activeAd.description?.length||0} / 3000`;if(activeAd.image){previewImage.src=activeAd.image;previewImage.style.display="block"}else{previewImage.src="";previewImage.style.display="none"};adFormOverlay.classList.add("show")}
function bukaFormIklan(){editMode=!1;formTitle.textContent="Pasang Iklan Baru";btnKirim.style.display="block";btnEdit.classList.remove("show");btnHapus.classList.remove("show");secretGroup.style.display="none";document.getElementById("adForm").reset();charCount.textContent="0 / 3000";previewImage.src="";previewImage.style.display="none";adFormOverlay.classList.add("show")}
function tutupFormIklan(){adFormOverlay.classList.remove("show")}
document.getElementById("description").addEventListener("input",function(){charCount.textContent=`${this.value.length} / 3000`});

document.getElementById("btnEdit").addEventListener("click",async()=>{const e=document.getElementById("secretCode").value.trim(),t=document.getElementById("statusBox");if(!e)return t.style.display="block",t.style.background="#FEE2E2",t.style.color="#991B1B",t.textContent="Masukkan Kode Kelola!";t.style.display="block";t.style.background="#EFF6FF";t.style.color="#1E40AF";t.textContent="Menyimpan...";try{const n=new URLSearchParams;n.append("action","updateAd");n.append("id",activeAd.id);n.append("secret_code",e);n.append("title",document.getElementById("title").value.trim());n.append("category",document.getElementById("category").value);n.append("location",document.getElementById("location").value.trim());n.append("whatsapp",document.getElementById("whatsapp").value.trim());n.append("description",document.getElementById("description").value.trim());const s=await fetch(`${API_URL}?${n.toString()}`),o=await s.json();if(o.success){t.style.background="#D1FAE5";t.style.color="#065F46";t.textContent="✅ Tersimpan!";setTimeout(()=>{tutupFormIklan();ambilDataIklan()},2000)}else{t.style.background="#FEE2E2";t.style.color="#991B1B";t.textContent="❌ Kode tidak cocok!"}}catch(e){t.style.background="#FEE2E2";t.style.color="#991B1B";t.textContent="❌ Gagal hubung server"}});

document.getElementById("btnHapus").addEventListener("click",async()=>{const e=document.getElementById("secretCode").value.trim(),t=document.getElementById("statusBox");if(!e)return t.style.display="block",t.style.background="#FEE2E2",t.style.color="#991B1B",t.textContent="Masukkan Kode Kelola!";if(!confirm("⚠️ Hapus permanen? Tidak bisa dikembalikan!"))return;t.style.display="block";t.style.background="#EFF6FF";t.style.color="#1E40AF";t.textContent="Menghapus...";try{const n=new URLSearchParams;n.append("action","deleteAd");n.append("id",activeAd.id);n.append("secret_code",e);const s=await fetch(`${API_URL}?${n.toString()}`),o=await s.json();if(o.success){t.style.background="#D1FAE5";t.style.color="#065F46";t.textContent="✅ Terhapus!";setTimeout(()=>{tutupFormIklan();ambilDataIklan()},2000)}else{t.style.background="#FEE2E2";t.style.color="#991B1B";t.textContent="❌ Kode tidak cocok!"}}catch(e){t.style.background="#FEE2E2";t.style.color="#991B1B";t.textContent="❌ Gagal hubung server"}});

navSearch.addEventListener("click",()=>{searchBar.classList.toggle("show");searchBar.classList.contains("show")?setTimeout(()=>searchInput.focus(),100):(searchInput.value="",tampilkanAwal())});
searchInput.addEventListener("input",()=>{const e=searchInput.value.trim().toLowerCase();searchClear.classList.toggle("show",e!=="");if(!e)return displayAds=[...allAds],tampilkanAwal();displayAds=allAds.filter(t=>{return(t.title||"").toLowerCase().includes(e)||(t.category||"").toLowerCase().includes(e)||(t.location||"").toLowerCase().includes(e)||(t.description||"").toLowerCase().includes(e)});tampilkanAwal();displayAds.length===0&&(feedContainer.innerHTML=`<div class="empty-state"><i data-lucide="search-x"></i><p>Tidak ditemukan iklan untuk "${e}"</p></div>`,lucide.createIcons({context:feedContainer}))});
searchClear.addEventListener("click",()=>{searchInput.value="";tampilkanAwal()});
navTop.addEventListener("click",()=>{feedContainer.scrollTo({top:0,behavior:"smooth"})});

async function bagikanIklan(e){if(!activeAd)return;const t=`https://rewangiklan.my.id/iklan-saya.html?id=${e}`,n={title:activeAd.title||"Iklan Rewang Iklan",text:`Lihat iklan: ${activeAd.title}`,url:t};try{if(navigator.share)await navigator.share(n);else await navigator.clipboard.writeText(t),alert("Tautan disalin!")}catch(e){try{await navigator.clipboard.writeText(t),alert("Tautan disalin!")}catch(e){alert("Perangkat tidak mendukung berbagi")}}}

document.addEventListener("DOMContentLoaded",ambilDataIklan);
</script>
</body>
</html>
