<!-- ==========================================
     2. DEVICE OPTIMIZATION & REDIRECT SCRIPT
     ========================================== -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script>
    (function() {
        function checkDeviceAndRedirect() {
            const isDesktop = !/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const isLargeScreen = window.innerWidth >= 768;
            const isNotIndex = !window.location.pathname.endsWith("/index.html") && window.location.pathname !== "/";

            if (isDesktop && isLargeScreen && isNotIndex) {
                window.location.href = "https://rewangiklan.my.id/index.html";
            }
        }
        checkDeviceAndRedirect();
        window.addEventListener("resize", checkDeviceAndRedirect);
    })();
</script>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Rewang Iklan",
  "url": "https://rewangiklan.my.id/",
  "description": "Pasang dan cari iklan baris gratis untuk properti, kendaraan, barang, jasa, dan bisnis.",
  "inLanguage": "id-ID"
}
</script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.424.0/dist/umd/lucide.min.js"></script>    
<link rel="stylesheet" href="mstyle.css">
</head>
<body>
<div class="search-bar" id="searchBar">
  <i data-lucide="search"></i>
  <input
    type="text"
    id="searchInput"
    placeholder="Cari nama, kategori, lokasi..."
  /><button class="search-clear" id="searchClear">
    <i data-lucide="x"></i>
  </button>
</div>
<div class="feed-container" id="feedContainer">
  <div class="empty-state">
    <i data-lucide="loader-2"></i>
    <p>Memuat iklan...</p>
  </div>
</div>
<div class="detail-overlay" id="detailOverlay">
  <button class="detail-close" onclick="tutupDetailIklan()">
    <i data-lucide="x"></i>
  </button>
  <div class="detail-main-img" id="detailImg"></div>
  <div class="detail-content">
    <h2 class="detail-title" id="detailTitle"></h2>
    <p style="color:#9CA3AF;margin-bottom:8px">
      Kategori: <span id="detailCat"></span>
    </p>
    <p style="color:#9CA3AF;margin-bottom:8px">
      📍 <span id="detailLoc"></span>
    </p>
    <p style="color:#9CA3AF;margin-bottom:12px">
      👁️ Dilihat <span id="detailViews"></span> kali
    </p>
    <div class="detail-desc" id="detailDesc"></div>
    <button class="btn-wa" id="btnWa">💬 Hubungi via WhatsApp</button
    ><button class="btn-manage" onclick="bukaEditIklan()">
      ⚙️ Kelola / Edit / Hapus Iklan
    </button>
  </div>
</div>
<div class="ad-form-overlay" id="adFormOverlay">
  <button class="form-close" onclick="tutupFormIklan()">
    <i data-lucide="x"></i>
  </button>
  <div class="form-header"><h4 id="formTitle">Pasang Iklan Baru</h4></div>
  <div class="form-content">
    <form id="adForm">
      <div class="form-layout">
        <div class="upload-side">
          <label class="upload-title">Foto Iklan</label
          ><input type="file" id="imageInput" accept="image/*" />
          <p class="help">Format JPG/PNG, otomatis diubah ke WebP</p>
          <div class="preview-box">
            <img id="previewImage" alt="Pratinjau Gambar" />
          </div>
        </div>
        <div class="data-side">
          <div class="form-group">
            <label>Judul Iklan</label
            ><input type="text" id="title" maxlength="80" required />
          </div>
          <div class="form-group">
            <label>Kategori</label
            ><select id="category" required>
              <option value="">Pilih Kategori</option>
              <option>Mobil</option>
              <option>Motor</option>
              <option>Properti</option>
              <option>Elektronik</option>
              <option>Lowongan</option>
              <option>Jasa</option>
              <option>Hobi</option>
              <option>Fashion</option>
              <option>Lainnya</option>
            </select>
          </div>
          <div class="form-group">
            <label>Lokasi / Kota</label
            ><input type="text" id="location" required />
          </div>
          <div class="form-group">
            <label>Nomor WhatsApp</label
            ><input
              type="text"
              id="whatsapp"
              placeholder="Contoh: 6281234567890"
              required
            />
          </div>
          <div class="form-group">
            <label>Deskripsi Iklan</label
            ><textarea id="description" maxlength="3000" required></textarea>
            <div id="charCount" class="char-count">0 / 3000</div>
          </div>
          <div class="form-group" id="secretGroup" style="display:none">
            <label>Kode Kelola</label
            ><input
              type="text"
              id="secretCode"
              placeholder="Masukkan kode rahasia Anda"
            />
            <p class="help">Kode didapat saat pertama kali pasang iklan</p>
          </div>
        </div>
      </div>
      <div class="form-buttons">
        <button type="submit" class="btn-kirim" id="btnKirim">
          ✅ Pasang Iklan</button
        ><button type="button" class="btn-edit" id="btnEdit">
          ✏️ Simpan Perubahan</button
        ><button type="button" class="btn-hapus" id="btnHapus">
          🗑️ Hapus Iklan
        </button>
      </div>
    </form>
    <div id="statusBox" class="status-box"></div>
  </div>
</div>
<nav class="bottom-nav">
  <div class="nav-item" id="navSearch">
    <i data-lucide="search"></i><span>Search</span>
  </div>
  <div class="nav-item" id="navInstall">
    <i data-lucide="download"></i><span>Add</span>
  </div>
  <div class="nav-item" id="navTop">
    <i data-lucide="arrow-up-to-line"></i><span>Back To Top</span>
  </div>
</nav>
<div class="play-hint">Sentuh layar atau gulir untuk kembali</div>

    <script src="mscript.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function(){
  const el = document.getElementById("detailDesc");
  if(el){
    el.innerHTML = el.textContent.replace(/(https?:\/\/\S+)/g, u => `<a href="${u}" target="_blank" rel="noopener noreferrer" style="color:#00a2ff;text-decoration:none">${u}</a>`);
  }
});
    </script>

</body>
</html>
