<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">

<title>Share Iklan</title>

<!-- Open Graph -->
<meta property="og:type" content="article">
<meta property="og:site_name" content="Rewang Iklan">
<meta property="og:locale" content="id_ID">

<meta property="og:title" content="">
<meta property="og:description" content="">
<meta property="og:url" content="">
<meta property="og:image" content="">

<!-- Twitter -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="">
<meta name="twitter:description" content="">
<meta name="twitter:image" content="">

<script>
const id = new URLSearchParams(location.search).get("id") || "";

const title = "Iklan " + id;
const desc  = "Lihat detail iklan " + id;
const url   = "https://rewangiklan.my.id/iklan.html?id=" + id;
const image = "https://rewangiklan.my.id/img/default.jpg";

// Title
document.title = title;

// Open Graph
document.querySelector('meta[property="og:title"]').setAttribute("content", title);
document.querySelector('meta[property="og:description"]').setAttribute("content", desc);
document.querySelector('meta[property="og:url"]').setAttribute("content", url);
document.querySelector('meta[property="og:image"]').setAttribute("content", image);

// Twitter
document.querySelector('meta[name="twitter:title"]').setAttribute("content", title);
document.querySelector('meta[name="twitter:description"]').setAttribute("content", desc);
document.querySelector('meta[name="twitter:image"]').setAttribute("content", image);

// Redirect
setTimeout(function(){
    location.replace(url);
},1000);
</script>

</head>

<body>
<center>
<h3>Memuat iklan...</h3>
<p>Mohon tunggu sebentar...</p>
</center>
</body>
</html>
