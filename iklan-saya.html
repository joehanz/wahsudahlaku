<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Iklan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-shell">
        <button class="scroll-up" id="scrollUpBtn">↑</button>
        <button class="scroll-down" id="scrollDownBtn">↓</button>

        <div class="phone-screen">
            <div class="content-area" id="mainContent">

                <div class="page">
                    <div class="back-bar">
                        <button class="btn-back" onclick="window.history.back()">←</button>
                        <h4>Detail Iklan</h4>
                    </div>

                    <div class="detail-main-img" id="detailImg"></div>
                    <div class="detail-content">
                        <h2 class="detail-title" id="detailTitle"></h2>
                        <p style="color:#666; margin-bottom:10px;">Kategori: <span id="detailCat"></span></p>
                        <p style="color:#666; margin-bottom:10px;">📍 <span id="detailLoc"></span></p>
                        <p style="color:#666; margin-bottom:10px;">👁️ Dilihat <span id="detailViews"></span> kali</p>
                        <div class="detail-desc" id="detailDesc"></div>
                        <button class="btn-wa" id="btnWa">💬 Hubungi via WhatsApp</button>
                        <button class="btn-manage" onclick="window.location.href='pasang.html?mode=edit&id=' + currentId">⚙️ Kelola Iklan Ini</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let currentId = "";
        async function loadDetail() {
            const params = new URLSearchParams(window.location.search);
            currentId = params.get('id');
            if (!currentId) {
                document.querySelector('.detail-content').innerHTML = "<p>Iklan tidak ditemukan</p>";
                return;
            }
            try {
                const res = await fetch(`${API_URL}?action=detail&id=${currentId}`);
                const data = await res.json();
                if (!data.success) throw new Error(data.error);
                const ad = data.ad;
                document.getElementById('detailImg').style.backgroundImage = `url('${ad.image || 'https://rewangiklan.my.id/image/no-image.webp'}')`;
                document.getElementById('detailTitle').textContent = ad.title;
                document.getElementById('detailCat').textContent = ad.category;
                document.getElementById('detailLoc').textContent = ad.location;
                document.getElementById('detailViews').textContent = ad.views;
                document.getElementById('detailDesc').textContent = ad.description;
                document.getElementById('btnWa').onclick = () => window.open(`https://wa.me/${ad.whatsapp}`, '_blank');
            } catch (err) {
                document.querySelector('.detail-content').innerHTML = `<p style="color:red;">${err.message}</p>`;
            }
        }
        window.onload = loadDetail;
    </script>
</body>
</html>
