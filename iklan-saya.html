<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Iklan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-shell">
        <button class="scroll-btn scroll-up" id="scrollUp">↑</button>
        <button class="scroll-btn scroll-down" id="scrollDown">↓</button>

        <div class="phone-screen">
            <div class="content-area" id="mainContent">
                <div class="page">
                    <div class="back-bar">
                        <button class="btn-back" onclick="window.history.back()">←</button>
                        <h4>Detail Iklan</h4>
                    </div>

                    <div class="detail-main-img" id="detailImg"></div>
                    <div class="detail-content">
                        <h2 class="detail-title" id="detailTitle"></h2>
                        <p style="color:#666; margin-bottom:8px;">Kategori: <span id="detailCat"></span></p>
                        <p style="color:#666; margin-bottom:8px;">📍 <span id="detailLoc"></span></p>
                        <p style="color:#666; margin-bottom:12px;">👁️ Dilihat <span id="detailViews"></span> kali</p>
                        <div class="detail-desc" id="detailDesc"></div>
                        <button class="btn-wa" id="btnWa">💬 Hubungi via WhatsApp</button>
                        <button class="btn-manage" id="btnManage">⚙️ Kelola / Edit / Hapus Iklan</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
