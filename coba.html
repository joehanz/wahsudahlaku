<script>
// Inisialisasi Ikon & Variabel Utama
lucide.createIcons();
const API_URL = "https://script.google.com/macros/s/AKfycbzwXBjQbOoHjb5btAFrja7llCgXT1KahBrI2-OyrfERGYy2XXkeXJxNNhdKyupqI6TK7w/exec";
let semuaIklan = [], tampilkanIklan = [], iklanAktif = [], modeEdit = false, gambarBase64 = "";

// Elemen DOM
const feed = document.getElementById("feedContainer");
const detailPanel = document.getElementById("detailOverlay");
const formPanel = document.getElementById("adFormOverlay");
const statusPanel = document.getElementById("statusBox");

// 1. Fungsi Muat & Tampilkan Iklan
async function ambilSemuaIklan() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    semuaIklan = data.filter(i => i.status === "aktif").reverse();
    tampilkanIklan = [...semuaIklan];
    renderIklan();
  } catch (err) {
    feed.innerHTML = `<div class="empty-state"><i data-lucide="alert-triangle"></i><p>Gagal memuat iklan, coba lagi nanti</p></div>`;
    lucide.createIcons({context: feed});
  }
}

function renderIklan() {
  feed.innerHTML = "";
  if (tampilkanIklan.length === 0) {
    feed.innerHTML = `<div class="empty-state"><i data-lucide="inbox"></i><p>Belum ada iklan yang ditampilkan</p></div>`;
    lucide.createIcons({context: feed});
    return;
  }
  tampilkanIklan.forEach(iklan => {
    const kartu = document.createElement("div");
    kartu.className = "ad-card";
    kartu.innerHTML = `
      <img src="${iklan.image || 'https://picsum.photos/id/1040/800/1400'}" class="ad-image" loading="lazy" alt="${iklan.title}">
      <h3 class="ad-title">${iklan.title || "Tanpa Judul"}</h3>
      <div class="side-actions">
        <div class="side-btn" onclick="bukaDetail('${iklan.id}')">
          <i data-lucide="eye"></i>
          <span>Detail</span>
        </div>
        <div class="side-btn" onclick="bagikanIklan('${iklan.id}')">
          <i data-lucide="share-2"></i>
          <span>Bagikan</span>
        </div>
      </div>
    `;
    feed.appendChild(kartu);
  });
  lucide.createIcons({context: feed});
}

// 2. Fungsi Detail Iklan
async function bukaDetail(idIklan) {
  iklanAktif = semuaIklan.find(i => i.id === idIklan);
  if (!iklanAktif) return;
  
  document.getElementById("detailImg").style.backgroundImage = `url(${iklanAktif.image})`;
  document.getElementById("detailTitle").textContent = iklanAktif.title;
  document.getElementById("detailCat").textContent = iklanAktif.category;
  document.getElementById("detailLoc").textContent = iklanAktif.location;
  document.getElementById("detailViews").textContent = iklanAktif.views || 0;
  document.getElementById("detailDesc").textContent = iklanAktif.description;
  
  document.getElementById("btnWa").onclick = () => {
    const nomor = iklanAktif.whatsapp.replace(/\D/g, "");
    const pesan = encodeURIComponent(`Halo, saya tertarik dengan iklan Anda: ${iklanAktif.title}`);
    window.open(`https://wa.me/${nomor}?text=${pesan}`);
  };
  
  detailPanel.classList.add("show");
}

function tutupDetailIklan() {
  detailPanel.classList.remove("show");
}

// 3. Fungsi Form Pasang & Edit
function bukaFormIklan() {
  modeEdit = false;
  document.getElementById("formTitle").textContent = "Pasang Iklan Baru";
  document.getElementById("btnKirim").style.display = "block";
  document.getElementById("btnEdit").classList.remove("show");
  document.getElementById("btnHapus").classList.remove("show");
  document.getElementById("kodeKelolaGroup").style.display = "none";
  resetForm();
  formPanel.classList.add("show");
}

function bukaEditIklan() {
  tutupDetailIklan();
  if (!iklanAktif) return;
  
  modeEdit = true;
  document.getElementById("formTitle").textContent = "Edit Iklan";
  document.getElementById("btnKirim").style.display = "none";
  document.getElementById("btnEdit").classList.add("show");
  document.getElementById("btnHapus").classList.add("show");
  document.getElementById("kodeKelolaGroup").style.display = "flex";
  
  // Isi data lama
  document.getElementById("title").value = iklanAktif.title;
  document.getElementById("category").value = iklanAktif.category;
  document.getElementById("location").value = iklanAktif.location;
  document.getElementById("whatsapp").value = iklanAktif.whatsapp;
  document.getElementById("description").value = iklanAktif.description;
  gambarBase64 = iklanAktif.image || "";
  if (gambarBase64) {
    document.getElementById("previewImage").src = gambarBase64;
    document.getElementById("previewImage").style.display = "block";
  }
  formPanel.classList.add("show");
}

function tutupFormIklan() {
  formPanel.classList.remove("show");
  resetForm();
}

function resetForm() {
  document.getElementById("adForm").reset();
  document.getElementById("previewImage").src = "";
  document.getElementById("previewImage").style.display = "none";
  document.getElementById("charNum").textContent = "0";
  statusPanel.style.display = "none";
  gambarBase64 = "";
}

// 4. Proses Gambar ke WebP
document.getElementById("imageInput").addEventListener("change", async e => {
  const file = e.target.files[0];
  if (!file) return;
  
  const pembaca = new FileReader();
  pembaca.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const kanvas = document.createElement("canvas");
      kanvas.width = 600;
      kanvas.height = 450;
      const ctx = kanvas.getContext("2d");
      ctx.drawImage(img, 0, 0, 600, 450);
      gambarBase64 = kanvas.toDataURL("image/webp", 0.75);
      document.getElementById("previewImage").src = gambarBase64;
      document.getElementById("previewImage").style.display = "block";
    };
    img.src = ev.target.result;
  };
  pembaca.readAsDataURL(file);
});

// 5. Batas Pasang Iklan (Maks 3/24 Jam)
function cekBatasPasang() {
  const riwayat = JSON.parse(localStorage.getItem("log_pasang_iklan") || "[]");
  const sekarang = new Date();
  const dalam24jam = riwayat.filter(t => sekarang - new Date(t) < 86400000);
  if (dalam24jam.length >= 3) {
    tampilkanStatus("⚠️ Batas tercapai", "Maksimal 3 iklan dalam 24 jam, coba lagi nanti", "merah");
    return false;
  }
  return true;
}

// 6. Kirim Iklan Baru
document.getElementById("adForm").addEventListener("submit", async e => {
  e.preventDefault();
  if (modeEdit) return;
  if (!cekBatasPasang()) return;
  
  tampilkanStatus("Mengirim iklan...", "Sedang memproses data", "biru");
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        title: document.getElementById("title").value.trim(),
        category: document.getElementById("category").value,
        location: document.getElementById("location").value.trim(),
        whatsapp: document.getElementById("whatsapp").value.trim(),
        description: document.getElementById("description").value.trim(),
        image: gambarBase64
      })
    });
    const hasil = await res.json();
    if (hasil.success) {
      tampilkanStatus("✅ Berhasil!", `Iklan terpasang. Simpan kode kelola Anda: <strong>${hasil.secret_code}</strong>`, "hijau");
      // Simpan riwayat
      const riwayat = JSON.parse(localStorage.getItem("log_pasang_iklan") || "[]");
      riwayat.push(new Date().toISOString());
      localStorage.setItem("log_pasang_iklan", JSON.stringify(riwayat));
      // Muat ulang data
      setTimeout(() => { tutupFormIklan(); ambilSemuaIklan(); }, 3500);
    } else {
      tampilkanStatus("❌ Gagal", hasil.error || "Terjadi kesalahan saat mengirim", "merah");
    }
  } catch {
    tampilkanStatus("❌ Gagal", "Tidak terhubung ke server, cek koneksi Anda", "merah");
  }
});

// 7. Simpan Perubahan Iklan
document.getElementById("btnEdit").addEventListener("click", async () => {
  const kode = document.getElementById("secretCode").value.trim();
  if (!kode) { tampilkanStatus("⚠️ Isi kode kelola dulu", "", "merah"); return; }
  
  tampilkanStatus("Menyimpan perubahan...", "", "biru");
  try {
    const res = await fetch(`${API_URL}?action=updateAd`, {
      method: "POST",
      body: JSON.stringify({
        id: iklanAktif.id,
        secret_code: kode,
        title: document.getElementById("title").value.trim(),
        category: document.getElementById("category").value,
        location: document.getElementById("location").value.trim(),
        whatsapp: document.getElementById("whatsapp").value.trim(),
        description: document.getElementById("description").value.trim(),
        image: gambarBase64 || iklanAktif.image
      })
    });
    const hasil = await res.json();
    if (hasil.success) {
      tampilkanStatus("✅ Tersimpan!", "Perubahan iklan sudah disimpan", "hijau");
      setTimeout(() => { tutupFormIklan(); ambilSemuaIklan(); }, 2000);
    } else {
      tampilkanStatus("❌ Gagal", hasil.error || "Kode kelola salah", "merah");
    }
  } catch {
    tampilkanStatus("❌ Gagal", "Tidak terhubung ke server", "merah");
  }
});

// 8. Hapus Iklan
document.getElementById("btnHapus").addEventListener("click", async () => {
  if (!confirm("Yakin ingin menghapus iklan ini? Tindakan ini tidak bisa dibatalkan")) return;
  const kode = document.getElementById("secretCode").value.trim();
  if (!kode) { tampilkanStatus("⚠️ Isi kode kelola dulu", "", "merah"); return; }
  
  tampilkanStatus("Menghapus iklan...", "", "biru");
  try {
    const res = await fetch(`${API_URL}?action=deleteAd`, {
      method: "POST",
      body: JSON.stringify({ id: iklanAktif.id, secret_code: kode })
    });
    const hasil = await res.json();
    if (hasil.success) {
      tampilkanStatus("✅ Terhapus!", "Iklan sudah dihapus permanen", "hijau");
      setTimeout(() => { tutupFormIklan(); ambilSemuaIklan(); }, 2000);
    } else {
      tampilkanStatus("❌ Gagal", hasil.error || "Kode kelola salah", "merah");
    }
  } catch {
    tampilkanStatus("❌ Gagal", "Tidak terhubung ke server", "merah");
  }
});

// Fungsi Bantu Lainnya
function tampilkanStatus(judul, pesan, warna) {
  statusPanel.style.display = "block";
  statusPanel.innerHTML = `<strong>${judul}</strong><br>${pesan}`;
  if (warna === "hijau") statusPanel.style.background = "#D1FAE5";
  if (warna === "merah") statusPanel.style.background = "#FEE2E2";
  if (warna === "biru") statusPanel.style.background = "#EFF6FF";
  statusPanel.style.color = "#111827";
}

function bukaCari() {
  const kata = prompt("Masukkan kata kunci pencarian:");
  if (!kata) return;
  const kunci = kata.toLowerCase();
  tampilkanIklan = semuaIklan.filter(i => 
    (i.title + i.category + i.location + i.description).toLowerCase().includes(kunci)
  );
  renderIklan();
}

function keBeranda() {
  feed.scrollTo({ top: 0, behavior: "smooth" });
}

function bagikanIklan(id) {
  const tautan = `https://rewangiklan.my.id/iklan-saya.html?id=${id}`;
  if (navigator.share) {
    navigator.share({ url: tautan });
  } else {
    navigator.clipboard.writeText(tautan).then(() => alert("Tautan iklan disalin ke papan klip"));
  }
}

// Hitung Karakter Deskripsi
document.getElementById("description").addEventListener("input", e => {
  document.getElementById("charNum").textContent = e.target.value.length;
});

// Jalankan saat halaman siap
document.addEventListener("DOMContentLoaded", ambilSemuaIklan);
