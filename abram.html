<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iklan Baris Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom scrollbar tersembunyi tapi tetap bisa scroll jika konten panjang */
        body::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen">

    <div class="w-full max-w-md bg-[#f7f9fa] min-h-screen shadow-lg relative flex flex-col pb-24">
        
        <div class="bg-[#1a3150] px-4 pt-4 pb-3 sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="relative flex-1">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" placeholder="Cari Iklan..." class="w-full bg-white text-gray-800 pl-10 pr-4 py-2 rounded-lg text-sm focus:outline-none shadow-inner">
                </div>
                <button class="relative text-white text-xl p-1">
                    <i class="fa-regular fa-bell"></i>
                    <span class="absolute top-0 right-0 bg-orange-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">?</span>
                </button>
            </div>
        </div>

        <div class="p-4">
            <div class="bg-gradient-to-r from-blue-600 via-teal-500 to-orange-400 rounded-xl p-4 flex justify-between items-center text-white shadow-sm">
                <div>
                    <h2 class="font-bold text-base leading-tight">Jual & Beli Mudah & Cepat!</h2>
                </div>
                <button class="bg-white text-gray-800 text-xs font-bold px-3 py-2 rounded-lg shadow-sm hover:bg-gray-100 transition">
                    Pasang Iklan
                </button>
            </div>
        </div>

        <div class="px-4 mb-4">
            <div class="grid grid-cols-4 gap-3">
                <div class="bg-white p-3 rounded-xl flex flex-col items-center justify-center shadow-sm border border-gray-100 cursor-pointer">
                    <div class="text-3xl text-orange-500 mb-1"><i class="fa-solid fa-car"></i></div>
                    <span class="text-xs font-semibold text-gray-700">Mobil</span>
                </div>
                <div class="bg-white p-3 rounded-xl flex flex-col items-center justify-center shadow-sm border border-gray-100 cursor-pointer">
                    <div class="text-3xl text-slate-700 mb-1"><i class="fa-solid fa-motorcycle"></i></div>
                    <span class="text-xs font-semibold text-gray-700">Motor</span>
                </div>
                <div class="bg-white p-3 rounded-xl flex flex-col items-center justify-center shadow-sm border border-gray-100 cursor-pointer">
                    <div class="text-3xl text-orange-600 mb-1"><i class="fa-solid fa-house-chimney"></i></div>
                    <span class="text-xs font-semibold text-gray-700">Properti</span>
                </div>
                <div class="bg-white p-3 rounded-xl flex flex-col items-center justify-center shadow-sm border border-gray-100 cursor-pointer">
                    <div class="text-3xl text-blue-400 mb-1"><i class="fa-solid fa-mobile-screen-button"></i></div>
                    <span class="text-xs font-semibold text-gray-700">Elektronik</span>
                </div>
                <div class="bg-white p-3 rounded-xl flex flex-col items-center justify-center shadow-sm border border-gray-100 cursor-pointer">
                    <div class="text-3xl text-slate-600 mb-1"><i class="fa-solid fa-briefcase"></i></div>
                    <span class="text-xs font-semibold text-gray-700">Lowongan</span>
                </div>
                <div class="bg-white p-3 rounded-xl flex flex-col items-center justify-center shadow-sm border border-gray-100 cursor-pointer">
                    <div class="text-3xl text-blue-600 mb-1"><i class="fa-solid fa-screwdriver-wrench"></i></div>
                    <span class="text-xs font-semibold text-gray-700">Jasa</span>
                </div>
                <div class="bg-white p-3 rounded-xl flex flex-col items-center justify-center shadow-sm border border-gray-100 cursor-pointer">
                    <div class="text-3xl text-slate-600 mb-1"><i class="fa-solid fa-gamepad"></i></div>
                    <span class="text-xs font-semibold text-gray-700">Hobi</span>
                </div>
                <div class="bg-white p-3 rounded-xl flex flex-col items-center justify-center shadow-sm border border-gray-100 cursor-pointer">
                    <div class="text-3xl text-orange-500 mb-1"><i class="fa-solid fa-shirt"></i></div>
                    <span class="text-xs font-semibold text-gray-700">Fashion</span>
                </div>
            </div>
        </div>

        <div class="px-4 flex-1">
            <div class="flex justify-between items-center mb-3">
                <h3 class="font-bold text-gray-800 text-base">Iklan Terbaru</h3>
                <a href="#" class="text-sm text-blue-600 font-medium flex items-center gap-1">Lihat Semua <i class="fa-solid fa-caret-down text-xs"></i></a>
            </div>

            <div class="space-y-3">
                
                <div class="bg-white p-3 rounded-xl flex gap-3 shadow-sm border border-gray-100 cursor-pointer hover:bg-gray-50 transition">
                    <div class="w-28 h-20 bg-gray-200 rounded-lg overflow-hidden relative flex-shrink-0">
                        <span class="absolute top-1 left-1 bg-green-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded">Dijual</span>
                        <img src="https://images.unsplash.com/photo-1549399542-7e3f8b79c341?w=300&auto=format&fit=crop&q=60" alt="Toyota Avanza" class="w-full h-full object-cover">
                    </div>
                    <div class="flex flex-col justify-between py-0.5">
                        <div>
                            <h4 class="font-bold text-gray-800 text-sm line-clamp-1">Toyota Avanza 2018</h4>
                            <p class="font-bold text-blue-900 text-sm mt-0.5">Rp 120.000.000</p>
                        </div>
                        <div class="flex items-center gap-3 text-[10px] text-gray-400">
                            <span><i class="fa-solid fa-location-dot mr-1"></i>Jakarta Selatan</span>
                            <span><i class="fa-regular fa-clock mr-1"></i>3 menit lalu</span>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-3 rounded-xl flex gap-3 shadow-sm border border-gray-100 cursor-pointer hover:bg-gray-50 transition">
                    <div class="w-28 h-20 bg-gray-200 rounded-lg overflow-hidden relative flex-shrink-0">
                        <span class="absolute top-1 left-1 bg-blue-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded">Disewakan</span>
                        <img src="https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?w=300&auto=format&fit=crop&q=60" alt="Apartemen Mewah" class="w-full h-full object-cover">
                    </div>
                    <div class="flex flex-col justify-between py-0.5">
                        <div>
                            <h4 class="font-bold text-gray-800 text-sm line-clamp-1">Apartemen Mewah</h4>
                            <p class="font-bold text-blue-900 text-sm mt-0.5">Rp 5.000.000/Bulan</p>
                        </div>
                        <div class="flex items-center gap-3 text-[10px] text-gray-400">
                            <span><i class="fa-solid fa-location-dot mr-1"></i>Bandung</span>
                            <span><i class="fa-regular fa-clock mr-1"></i>1 jam lalu</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div class="absolute bottom-0 inset-x-0 bg-white border-t border-gray-200 py-2 px-4 flex justify-between items-center z-50">
            <button class="flex flex-col items-center justify-center text-[#1a3150] w-14">
                <i class="fa-solid fa-house text-lg"></i>
                <span class="text-[10px] font-bold mt-1">Beranda</span>
            </button>
            <button class="flex flex-col items-center justify-center text-gray-400 hover:text-[#1a3150] w-14">
                <i class="fa-solid fa-heart text-lg text-orange-500"></i>
                <span class="text-[10px] font-bold mt-1 text-gray-600">Favorit</span>
            </button>
            <button class="flex flex-col items-center justify-center w-14 -translate-y-4">
                <div class="bg-orange-500 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md border-4 border-white text-xl">
                    <i class="fa-solid fa-plus"></i>
                </div>
                <span class="text-[10px] font-bold mt-0.5 text-gray-600">Pasang Iklan</span>
            </button>
            <button class="flex flex-col items-center justify-center text-gray-400 hover:text-[#1a3150] w-14">
                <i class="fa-solid fa-comment-dots text-lg text-slate-700"></i>
                <span class="text-[10px] font-bold mt-1 text-gray-600">Chat</span>
            </button>
            <button class="flex flex-col items-center justify-center text-gray-400 hover:text-[#1a3150] w-14">
                <i class="fa-solid fa-user text-lg text-slate-700"></i>
                <span class="text-[10px] font-bold mt-1 text-gray-600">Akun</span>
            </button>
        </div>

    </div>

    <script>
        // Logika interaktif sederhana jika nanti Anda ingin menambahkan aksi klik
        document.querySelectorAll('.grid > div').forEach(item => {
            item.addEventListener('click', () => {
                const kategori = item.querySelector('span').innerText;
                alert('Membuka kategori: ' + kategori);
            });
        });
    </script>
</body>
</html>
