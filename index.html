<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rewang Iklan - Beranda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-shell">
        <button class="scroll-up" id="scrollUpBtn">↑</button>
        <button class="scroll-down" id="scrollDownBtn">↓</button>

        <div class="phone-screen">
            <div class="content-area" id="mainContent">

                <div class="page active">
                    <div class="top-bar">
                        <input type="text" class="search-box" id="searchInput" placeholder="Cari Iklan...">
                        <button class="btn-post-main" onclick="window.location.href='pasang.html'">Pasang Iklan</button>
                    </div>

                    <div class="banner">
                        <h3>Jual & Beli Mudah & Cepat!</h3>
                    </div>

                    <div class="category-grid">
                        <div class="cat-item" data-cat="Semua"><div class="cat-icon">📋</div><span>Semua</span></div>
                        <div class="cat-item" data-cat="Properti"><div class="cat-icon">🏠</div><span>Properti</span></div>
                        <div class="cat-item" data-cat="Jasa"><div class="cat-icon">🔧</div><span>Jasa</span></div>
                        <div class="cat-item" data-cat="Lainnya"><div class="cat-icon">📦</div><span>Lainnya</span></div>
                    </div>

                    <div class="section-title">
                        <span>Iklan Terbaru</span>
                        <span class="link-more">Lihat Semua ▾</span>
                    </div>

                    <div id="adsContainer">
                        <p style="text-align:center; padding:2rem; color:#888;">Memuat iklan...</p>
                    </div>

                    <div class="bottom-nav">
                        <div class="nav-item active">🏠<br>Beranda</div>
                        <div class="nav-item" onclick="window.location.href='pasang.html'">⚙️<br>Kelola</div>
                        <button class="btn-add-center" onclick="window.location.href='pasang.html'">+</button>
                        <div class="nav-item">💬<br>Chat</div>
                        <div class="nav-item">👤<br>Akun</div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
