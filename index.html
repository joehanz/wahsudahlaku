<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rewang Iklan - Beranda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-shell">
        <!-- Panah hanya tampil di desktop -->
        <button class="scroll-btn scroll-up" id="scrollUp">↑</button>
        <button class="scroll-btn scroll-down" id="scrollDown">↓</button>

        <div class="phone-screen">
            <div class="content-area" id="mainContent">
                <div class="page active">
                    <div class="top-bar">
                        <input type="text" class="search-box" id="searchInput" placeholder="Cari iklan...">
                        <button class="btn-post-main" onclick="window.location.href='pasang.html'">Pasang Iklan</button>
                    </div>

                    <div class="banner">
                        <h3>Jual & Beli Mudah & Cepat!</h3>
                    </div>

                    <div class="category-wrapper">
                        <div class="category-grid" id="categoryScroll">
                            <div class="cat-item active" data-cat="Semua"><div class="cat-icon">📋</div><span>Semua</span></div>
                            <div class="cat-item" data-cat="Mobil"><div class="cat-icon">🚗</div><span>Mobil</span></div>
                            <div class="cat-item" data-cat="Motor"><div class="cat-icon">🏍️</div><span>Motor</span></div>
                            <div class="cat-item" data-cat="Properti"><div class="cat-icon">🏠</div><span>Properti</span></div>
                            <div class="cat-item" data-cat="Elektronik"><div class="cat-icon">📱</div><span>Elektronik</span></div>
                            <div class="cat-item" data-cat="Lowongan"><div class="cat-icon">💼</div><span>Lowongan</span></div>
                            <div class="cat-item" data-cat="Jasa"><div class="cat-icon">🔧</div><span>Jasa</span></div>
                            <div class="cat-item" data-cat="Hobi"><div class="cat-icon">🎮</div><span>Hobi</span></div>
                            <div class="cat-item" data-cat="Fashion"><div class="cat-icon">👕</div><span>Fashion</span></div>
                        </div>
                    </div>

                    <div class="section-title">
                        <span>Iklan Terbaru</span>
                        <span>Total: <span id="totalAds">0</span></span>
                    </div>

                    <div id="adsContainer"></div>
                    <div id="loadMoreBox" class="load-more-box" style="display:none;">
                        <button id="loadMoreBtn" class="btn-load-more">Muat Lebih Banyak</button>
                    </div>

                    <div class="bottom-nav">
                        <div class="nav-item">📊 Total Iklan</div>
                        <button class="btn-add-center" onclick="window.location.href='pasang.html'">+</button>
                        <div class="nav-item dola-logo" id="dolaBtn">🤖 Dola</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="dolaLayer" class="dola-layer">
        <div class="dola-content">
            <button class="dola-close" id="dolaClose">×</button>
            <h2>Halo, saya Dola!</h2>
            <p>Siap bantu urusan situs ini dan apapun yang kamu butuhkan 😎</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
